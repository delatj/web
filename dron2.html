<!DOCTYPE html>
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <title>Dron Duel - 30 Retos Cyber</title>
    <style>
        :root {
            --primary: #2ecc71; --p1-color: #e74c3c; --p2-color: #3498db; --grid-size: 40px;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; background: #eee; color: #333; }

        #split-container { position: fixed; inset: 0; display: flex; z-index: 1; }
        .arena { 
            flex: 1; position: relative; transition: background 0.8s ease; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 50px; perspective: 1000px;
            background-color: white; border: 1px solid #ccc;
        }

        /* Se aumentó la altura de la barra superior a 140px para acomodar el nuevo tamaño del texto */
        .top-bar { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; height: 140px; background: white; border-bottom: 3px solid #333; z-index: 200; }
        .score-card { text-align: center; padding: 10px; min-width: 200px; }
        .name-display { font-size: 1.1rem; font-weight: bold; color: #555; margin-bottom: 2px; }
        .score-val { font-size: 2.5rem; font-weight: 900; color: #222; margin: 0; display: none; /* Oculto temporalmente si solo quieres ver el multiplicador, o se puede dejar */ }
        
        /* Multiplicador original y nueva clase para el resultado final */
        .multiplier { color: #e67e22; font-size: 2.5rem; font-weight: 900; margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .res-final { color: black; font-weight: bold; font-size: 2em; }

        /* Se bajó el panel a 150px para que no choque con la barra superior ampliada */
        .cmd-panel { 
            position: absolute; top: 150px; width: 180px; 
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(5px);
            padding: 10px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.1); 
            z-index: 100; font-family: monospace; pointer-events: none;
        }
        .p1-panel { left: 20px; border-left: 5px solid var(--p1-color); }
        .p2-panel { right: 20px; border-right: 5px solid var(--p2-color); }
        
        .cmd-scroll { height: 35px; overflow: hidden; color: #222; font-size: 1.4rem; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 6px; text-align: center; font-weight: bold; }

        .pista { 
            width: 400px; height: 480px; position: relative; transform-style: preserve-3d; transform: rotateX(35deg);
            background-image: linear-gradient(black 2px, transparent 2px), linear-gradient(90deg, black 2px, transparent 2px);
            background-size: var(--grid-size) var(--grid-size); border: 4px solid #333; background-color: rgba(255,255,255,0.5);
        }
        .meta { position: absolute; width: 34px; height: 34px; border: 3px solid #333; border-radius: 50%; z-index: 5; background: rgba(255,255,0,0.4); }
        
        .dron-container { position: absolute; width: 40px; height: 40px; transform-style: preserve-3d; transition: all 0.35s; }
        .dron-body { width: 34px; height: 34px; margin: 3px; border-radius: 6px; position: relative; transform-style: preserve-3d; box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
        .dron-front { position: absolute; top: 0; left: 50%; width: 14px; height: 8px; background: #222; margin-left: -7px; border-radius: 2px 2px 0 0; }
        .p1-body { background: var(--p1-color); }
        .p2-body { background: var(--p2-color); }
        .helice { position: absolute; width: 30px; height: 2px; background: #fff; top: 50%; left: 50%; margin-left: -15px; animation: spin 0.1s infinite linear; opacity: 0; }
        @keyframes spin { to { transform: rotateZ(360deg); } }

        #modal, .quiz-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content, .quiz-card { background: white; color: #333; padding: 30px; border-radius: 15px; text-align: center; width: 450px; border: 5px solid #333; }
        .opt-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; cursor: pointer; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; font-weight: bold; text-align: left; }
        .opt-btn:hover { background: #f9f9f9; border-color: #3498db; }
    </style>
</head>
<body>

    <div id="modal">
        <div class="modal-content">
            <h2>🛸 DRON DUEL: EDICIÓN COMPLETA</h2>
            <p>30 Preguntas aleatorias con 3 opciones cada una.</p>
            <input type="text" id="name1" value="ALUMNO 1" style="width:80%; padding:10px; margin:5px;">
            <input type="text" id="name2" value="ALUMNO 2" style="width:80%; padding:10px; margin:5px;">
            <button onclick="startGame()" style="margin-top:15px; padding:15px 40px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">INICIAR</button>
        </div>
    </div>

    <div id="quiz-p1" class="quiz-overlay" style="display:none"></div>
    <div id="quiz-p2" class="quiz-overlay" style="display:none"></div>

    <div class="top-bar">
        <div class="score-card">
            <div id="label-n1" class="name-display">P1</div>
            <div class="score-val" id="score1" style="display:block;">0</div>
            <div id="calc-1" class="multiplier">[ 0 x 4 = <span class="res-final">0</span> ]</div>
        </div>
        <div style="align-self:center;">
            <button onclick="enviarResultados()" style="padding:10px 20px; cursor:pointer; background:#333; color:white; border:none; border-radius:5px; font-weight:bold;">ENVIAR DATOS</button>
        </div>
        <div class="score-card">
            <div id="label-n2" class="name-display">P2</div>
            <div class="score-val" id="score2" style="display:block;">0</div>
            <div id="calc-2" class="multiplier">[ 0 x 4 = <span class="res-final">0</span> ]</div>
        </div>
    </div>

    <div id="split-container">
        <div id="arena-p1" class="arena">
            <div class="cmd-panel p1-panel"><small>P1 COMANDOS:</small><div id="list-p1" class="cmd-scroll"></div></div>
            <div class="pista">
                <div id="meta-p1" class="meta" style="border-color:var(--p1-color)"></div>
                <div id="dron1" class="dron-container"><div class="dron-body p1-body"><div class="dron-front"></div><div class="helice"></div></div></div>
            </div>
        </div>
        <div id="arena-p2" class="arena">
            <div class="cmd-panel p2-panel"><small>P2 COMANDOS:</small><div id="list-p2" class="cmd-scroll"></div></div>
            <div class="pista">
                <div id="meta-p2" class="meta" style="border-color:var(--p2-color)"></div>
                <div id="dron2" class="dron-container"><div class="dron-body p2-body"><div class="dron-front"></div><div class="helice"></div></div></div>
            </div>
        </div>
    </div>

    <script>
        const GRID = 40;
        const QUESTIONS = [
            { q: "¿Qué es el Phishing?", a: ["Un deporte náutico", "Engaño por email para robar claves", "Un tipo de cable de red"], c: 1 },
            { q: "¿Qué contraseña es más segura?", a: ["12345678", "pAssw0rd!", "D0m1ng0_2024*"], c: 2 },
            { q: "Si recibes un link sospechoso de un amigo:", a: ["Lo abro porque confío en él", "Le pregunto por otro medio si él lo envió", "Lo borro inmediatamente sin mirar"], c: 1 },
            { q: "¿Qué indica el candado en la barra de direcciones?", a: ["Que la web es 100% legal", "Que la conexión está cifrada (HTTPS)", "Que no puedes copiar el contenido"], c: 1 },
            { q: "Sobre las redes Wi-Fi públicas:", a: ["Son totalmente seguras", "Son ideales para entrar al banco", "Son poco seguras para datos privados"], c: 2 },
            { q: "¿Qué es el Ciberacoso?", a: ["Un juego de rol online", "Acoso u humillación a través de redes", "Tener muchos seguidores"], c: 1 },
            { q: "La webcam de tu ordenador debería estar:", a: ["Siempre encendida por si acaso", "Tapada físicamente cuando no se usa", "Apuntando siempre a la ventana"], c: 1 },
            { q: "¿Qué información NO debes compartir?", a: ["Tu música favorita", "Tu dirección y número de teléfono", "Tu color de ojos"], c: 1 },
            { q: "¿Qué es un Malware?", a: ["Un software para editar fotos", "Cualquier programa malicioso (virus, etc)", "Un componente de la placa base"], c: 1 },
            { q: "Si recibes un premio por SMS de un sorteo en el que no participaste:", a: ["Reclamo el premio rápido", "Es un intento de estafa", "Llamo al número para preguntar"], c: 1 },
            { q: "¿Qué es el Grooming?", a: ["Un tipo de peinado moderno", "Adulto que engaña a menor online", "Cuidar a tu mascota virtual"], c: 1 },
            { q: "Las redes sociales deben usarse para:", a: ["Compartir tus claves con amigos", "Ocio con configuración de privacidad", "Insultar a quien no te cae bien"], c: 1 },
            { q: "¿Qué significa el 2FA?", a: ["Doble Factor de Autenticación", "Dos Ficheros Adjuntos", "Segunda Fase de Arranque"], c: 0 },
            { q: "Tu perfil en redes sociales debería ser:", a: ["Público para ser famoso", "Privado (solo para conocidos)", "Con la dirección de tu casa"], c: 1 },
            { q: "Si alguien te insulta en un videojuego online:", a: ["Le devuelvo el insulto", "Le ignoro, silencio y reporto", "Apago el router"], c: 1 },
            { q: "¿Qué son las Fake News?", a: ["Noticias muy divertidas", "Noticias falsas para manipular", "Noticias sobre videojuegos"], c: 1 },
            { q: "Actualizar el sistema operativo sirve para:", a: ["Gastar espacio y batería", "Cerrar agujeros de seguridad", "Que el ordenador vaya más lento"], c: 1 },
            { q: "Un troyano es:", a: ["Un virus que se disfraza de programa útil", "Un programa para acelerar descargas", "Un antivirus gratuito"], c: 0 },
            { q: "Si ves algo perturbador en internet:", a: ["No digo nada a nadie", "Se lo cuento a un adulto de confianza", "Lo comparto con todos mis contactos"], c: 1 },
            { q: "¿Qué es la Huella Digital?", a: ["La marca de tu dedo en el móvil", "El rastro que dejas al navegar", "Un sistema de pago nuevo"], c: 1 },
            { q: "El antivirus sirve para:", a: ["Limpiar el polvo del PC", "Detectar y eliminar amenazas", "Mejorar la velocidad de internet"], c: 1 },
            { q: "¿Es seguro dar tu teléfono a desconocidos online?", a: ["Sí, para hacer amigos", "No, nunca", "Solo si me caen bien"], c: 1 },
            { q: "¿Qué es el Ransomware?", a: ["Virus que secuestra tus archivos", "Un programa de edición de vídeo", "Un tipo de monitor"], c: 0 },
            { q: "¿Se puede borrar algo de internet para siempre?", a: ["Sí, dándole a borrar", "Es casi imposible borrar el rastro total", "Solo si apagas el servidor"], c: 1 },
            { q: "Los términos de uso de una App:", a: ["No hace falta leerlos nunca", "Es importante saber qué hacen con tus datos", "Son todos iguales"], c: 1 },
            { q: "Un 'Hacker' ético es alguien que:", a: ["Roba contraseñas por diversión", "Busca fallos para ayudar a arreglarlos", "Bloquea páginas del gobierno"], c: 1 },
            { q: "Compartir tu ubicación en tiempo real es:", a: ["Muy seguro en cualquier red", "Peligroso si es público", "Necesario para jugar"], c: 1 },
            { q: "El Spam es:", a: ["Un virus muy potente", "Correo basura no deseado", "Un comando de programación"], c: 1 },
            { q: "¿Qué es un Firewall?", a: ["Una pared resistente al fuego", "Un sistema de defensa de red", "Un cable de alta velocidad"], c: 1 },
            { q: "Cerrar sesión en ordenadores públicos es:", a: ["Opcional si tengo prisa", "Fundamental para proteger mis cuentas", "Malo para el ordenador"], c: 1 }
        ];

        const state = {
            p1: { x: 0, y: 0, angle: 0, score: 0, nextQuiz: 10, cmds: [], exec: false, name: "" },
            p2: { x: 9, y: 11, angle: 180, score: 0, nextQuiz: 10, cmds: [], exec: false, name: "" },
            metas: { p1: {x: 4, y: 4}, p2: {x: 5, y: 5} }
        };

        function getColorByScore(score) {
            const colors = ["white", "#d6eaf8", "#d5f5e3", "#fcf3cf", "#fadbd8"];
            return colors[Math.min(4, Math.floor(score/10))];
        }

        function startGame() {
            state.p1.name = document.getElementById('name1').value || "ALUMNO 1";
            state.p2.name = document.getElementById('name2').value || "ALUMNO 2";
            document.getElementById('label-n1').innerText = state.p1.name;
            document.getElementById('label-n2').innerText = state.p2.name;
            document.getElementById('modal').style.display = 'none';
            moverMeta('p1'); moverMeta('p2');
            updateVisuals('p1'); updateVisuals('p2');
            updateScoreUI('p1'); updateScoreUI('p2');
        }

        function moverMeta(p) {
            state.metas[p].x = Math.floor(Math.random() * 10);
            state.metas[p].y = Math.floor(Math.random() * 12);
            const m = document.getElementById('meta-' + p);
            m.style.left = (state.metas[p].x * GRID + 3) + "px";
            m.style.top = (state.metas[p].y * GRID + 3) + "px";
        }

        window.onkeydown = (e) => {
            const k = e.code;
            
            // Controles del Jugador 1: Evaluamos solo el estado de ejecución del P1
            if(!state.p1.exec) {
                if(k === 'KeyW') addCmd('p1', '↑'); 
                if(k === 'KeyA') addCmd('p1', '↶'); 
                if(k === 'KeyD') addCmd('p1', '↷');
                if(k === 'Space') ejecutar('p1');
            }

            // Controles del Jugador 2: Evaluamos solo el estado de ejecución del P2
            if(!state.p2.exec) {
                if(k === 'ArrowUp') addCmd('p2', '↑'); 
                if(k === 'ArrowLeft') addCmd('p2', '↶'); 
                if(k === 'ArrowRight') addCmd('p2', '↷');
                if(k === 'Enter') ejecutar('p2');
            }
        };

        function addCmd(p, type) {
            state[p].cmds.push(type);
            document.getElementById('list-' + p).innerText = state[p].cmds.join('');
        }

        async function ejecutar(p) {
            if(state[p].cmds.length === 0) return;
            state[p].exec = true;
            const dX = state[p].x, dY = state[p].y, dA = state[p].angle;
            const dEl = document.getElementById(p === 'p1' ? 'dron1' : 'dron2');
            dEl.querySelector('.helice').style.opacity = 1;

            for(let cmd of state[p].cmds) {
                await new Promise(r => setTimeout(r, 300));
                if(cmd === '↶') state[p].angle -= 90;
                if(cmd === '↷') state[p].angle += 90;
                if(cmd === '↑') {
                    const rad = state[p].angle * Math.PI / 180;
                    state[p].x += Math.round(Math.sin(rad));
                    state[p].y -= Math.round(Math.cos(rad));
                }
                if(state[p].x < 0 || state[p].x > 9 || state[p].y < 0 || state[p].y > 11) {
                    state[p].x = dX; state[p].y = dY; state[p].angle = dA;
                    updateVisuals(p); break; 
                }
                updateVisuals(p);
            }

            await new Promise(r => setTimeout(r, 300));
            dEl.querySelector('.helice').style.opacity = 0;

            if(state[p].x === state.metas[p].x && state[p].y === state.metas[p].y) {
                state[p].score++;
                updateScoreUI(p);
                moverMeta(p);
                if(state[p].score >= state[p].nextQuiz) launchQuiz(p);
            } else {
                state[p].x = dX; state[p].y = dY; state[p].angle = dA;
                updateVisuals(p);
            }
            state[p].cmds = []; state[p].exec = false;
            document.getElementById('list-' + p).innerText = "";
        }

        function updateScoreUI(p) {
            const num = p === 'p1' ? '1' : '2';
            document.getElementById('score' + num).innerText = state[p].score;
            
            // Inyecta el HTML con la clase especial .res-final para modificar tamaño y color del resultado
            document.getElementById('calc-' + num).innerHTML = `[ ${state[p].score} x 4 = <span class="res-final">${state[p].score * 4}</span> ]`;
            
            document.getElementById('arena-' + p).style.backgroundColor = getColorByScore(state[p].score);
        }

        function launchQuiz(p) {
            state[p].exec = true;
            state[p].nextQuiz += 10;
            const q = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
            const overlay = document.getElementById('quiz-' + p);
            overlay.style.display = 'flex';
            overlay.innerHTML = `
                <div class="quiz-card">
                    <h3>🛡️ RETO CIBER: ${q.q}</h3>
                    ${q.a.map((opt, i) => `<button class="opt-btn" onclick="answerQuiz('${p}', ${i}, ${q.c})">${i+1}. ${opt}</button>`).join('')}
                </div>`;
        }

        function answerQuiz(p, idx, correct) {
            if(idx !== correct) state[p].score = Math.max(0, state[p].score - 2);
            document.getElementById('quiz-' + p).style.display = 'none';
            state[p].exec = false;
            updateScoreUI(p);
        }

        function updateVisuals(p) {
            const d = document.getElementById(p === 'p1' ? 'dron1' : 'dron2');
            d.style.left = (state[p].x * GRID) + "px";
            d.style.top = (state[p].y * GRID) + "px";
            d.querySelector('.dron-body').style.transform = `rotateZ(${state[p].angle}deg)`;
        }

        function enviarResultados() {
            const scriptUrl = "https://script.google.com/macros/s/AKfycbwVPttSZrhwfWwSZpFo7KWjJ39vldQm3MPGykMWEPWOoF4UsZ24mC8YhgiaE-0xm_7G/exec";
            const data = { player1: state.p1.name, score1: state.p1.score, player2: state.p2.name, score2: state.p2.score };
            fetch(scriptUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
            .then(() => alert("Datos enviados a la hoja de cálculo."));
        }
    </script>

</body></html>
