<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Robot Game - Progresión de Dificultad</title>
    <style>
        :root {
            --dark: #1a1a1a; --panel: #2c3e50; --accent: #f1c40f;
            --robot: #ecf0f1; --belt: #34495e; --danger: #e74c3c;
            --primary: #2ecc71;
        }
        body { background: #333; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; transition: background 1.2s ease; }

        /* PANEL LATERAL */
        .sidebar { width: 310px; background: var(--panel); padding: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .header-score { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; border: 2px solid var(--accent); }
        .score-box { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
        .instructions { background: #111; padding: 12px; border-radius: 8px; border-left: 5px solid #2ecc71; min-height: 50px; font-size: 0.85rem; }
        
        .control-group { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; }
        input[type="number"] { background: #000; border: 1px solid #444; color: var(--accent); padding: 8px; border-radius: 4px; text-align: center; width: 80%; margin: 0 auto; display: block; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .btn-move { background: var(--accent); color: #000; }
        .btn-grip { background: #9b59b6; color: white; }
        .btn-save { background: #3498db; color: white; grid-column: span 2; }
        #btn-sheets { background: #2ecc71; color: white; grid-column: span 2; margin-top: 5px; }

        .pos-list { flex-grow: 1; background: #111; border-radius: 6px; padding: 10px; overflow-y: auto; border: 1px solid #444; }
        .pos-card { background: #222; margin-bottom: 5px; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--accent); }

        /* MODALES */
        #player-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: white; padding: 35px; border-radius: 12px; text-align: center; color: #333; width: 320px; }
        .modal-box input { margin: 15px 0; width: 90%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }

        #status-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2001; }
        #status-msg { background: white; padding: 25px; border-radius: 8px; color: #155724; font-weight: bold; border: 4px solid var(--primary); }

        /* ESCENA ROBOT */
        .viewport { flex-grow: 1; position: relative; overflow: hidden; }
        .conveyor { position: absolute; bottom: 0; width: 100%; height: 90px; background: var(--belt); border-top: 8px solid #222; z-index: 10; }
        #robot-system { position: absolute; bottom: 215px; left: 50%; z-index: 100; }
        .link { position: absolute; bottom: 0; left: -16px; width: 32px; background: var(--robot); border: 3px solid #7f8c8d; border-radius: 16px; transform-origin: bottom center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .link-main { height: 140px; } 
        .link-sub { height: 130px; bottom: 125px; left: -2px; }
        .gripper { position: absolute; bottom: 115px; left: -24px; width: 80px; height: 16px; background: #95a5a6; }
        .claw { position: absolute; width: 18px; height: 55px; background: var(--danger); border-radius: 4px; transition: transform 0.2s; }
        .claw-l { left: 8px; bottom: -45px; }
        .claw-r { right: 8px; bottom: -45px; }
        .piece { position: absolute; width: 40px; height: 40px; border-radius: 6px; z-index: 50; }
        .box { position: absolute; bottom: 90px; width: 110px; height: 80px; border: 5px solid #fff; background: rgba(255,255,255,0.1); border-top: none; z-index: 20; }
        .box-label { background: white; color: black; font-size: 0.7rem; font-weight: bold; width: 100%; text-align: center; position: absolute; top: 0; }
    </style>
</head>
<body>

    <div id="player-modal">
        <div class="modal-box">
            <h2>Ingeniería Robótica</h2>
            <p>Introduce tu nombre para acceder:</p>
            <input type="text" id="nombre-operario" placeholder="Nombre del Alumno">
            <button onclick="iniciarSesion()" style="background:var(--primary); color:white; width:100%; padding:12px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">CONECTAR BRAZO</button>
        </div>
    </div>

    <div id="status-overlay">
        <div id="status-msg"></div>
    </div>

    <div class="sidebar">
        <div class="header-score">
            <span id="label-user">OP: ---</span>
            <div class="score-box" id="puntos">0</div>
        </div>
        <div class="instructions" id="mision-txt">Esperando piloto...</div>
        
        <div class="control-group">
            <input type="number" id="inpA1" value="0">
            <input type="number" id="inpA2" value="0">
        </div>

        <div class="btn-grid">
            <button class="btn-move" onclick="manualMove()">Mover</button>
            <button class="btn-grip" onclick="toggleClaw()" id="gripBtn">Pinza</button>
            <button class="btn-save" onclick="savePos()">Guardar Pos.</button>
            <button id="btn-sheets" onclick="enviarASheets()">ENVIAR A SHEETS</button>
        </div>
        
        <div class="pos-list" id="posList"></div>
    </div>

    <div class="viewport" id="factory">
        <div id="robot-system">
            <div class="link link-main" id="arm1">
                <div class="link link-sub" id="arm2">
                    <div class="gripper">
                        <div class="claw claw-l" id="cL"></div>
                        <div class="claw claw-r" id="cR"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="conveyor"></div>
    </div>

    <script>
        let puntos = 0;
        let isClawClosed = false;
        let itemHeld = null;
        let savedPositions = [];
        let operarioNombre = "";
        let enviado = false;
        const colors = { 'rojo': '#e74c3c', 'azul': '#3498db', 'verde': '#2ecc71', 'amarillo': '#f1c40f', 'naranja': '#e67e22' };
        let misionesActivas = [];

        function iniciarSesion() {
            const nom = document.getElementById('nombre-operario').value.trim();
            if(!nom) return alert("Escribe tu nombre.");
            operarioNombre = nom;
            document.getElementById('label-user').innerText = "OP: " + nom.split(" ")[0];
            document.getElementById('player-modal').style.display = 'none';
            setMision();
        }

        // --- GESTIÓN DE MISIONES Y DIFICULTAD ---
        function setMision() {
            document.querySelectorAll('.box').forEach(b => b.remove());
            misionesActivas = [];
            const safeX = () => (Math.random() * 220) - 110; 

            if (puntos < 6) {
                // NIVEL 1: Una sola caja que cambia
                const c = Object.keys(colors)[Math.floor(Math.random()*5)];
                createBox(safeX(), c); 
                document.getElementById('mision-txt').innerText = `NIVEL 1: Entrega piezas ${c.toUpperCase()}.`;
            } else {
                // NIVEL EXPERTO: Dos cajas fijas
                createBox(-110, 'rojo');
                createBox(110, 'azul');
                document.getElementById('mision-txt').innerText = `NIVEL EXPERTO: Clasificación Dual (Rojo/Azul).`;
            }
            updateBackground();
        }

        function createBox(x, colorTarget) {
            const b = document.createElement('div');
            b.className = 'box';
            const absX = (window.innerWidth / 2) + x - 55;
            b.style.left = absX + "px";
            b.style.borderColor = colors[colorTarget];
            const l = document.createElement('div');
            l.className = 'box-label';
            l.innerText = colorTarget.toUpperCase();
            b.appendChild(l);
            document.getElementById('factory').appendChild(b);
            misionesActivas.push({ el: b, color: colorTarget, xCenter: absX + 55 });
        }

        function updateBackground() {
            let bg = "#333";
            if (puntos >= 1 && puntos <= 5) bg = "#005a9e";   // Azul
            if (puntos >= 6 && puntos <= 10) bg = "#107c10";  // Verde
            if (puntos >= 11 && puntos <= 15) bg = "#d29200"; // Amarillo
            if (puntos >= 16 && puntos <= 20) bg = "#d35400"; // Naranja
            if (puntos >= 21) bg = "#a4262c";                 // Rojo (Experto)
            document.body.style.backgroundColor = bg;
        }

        // --- MOVIMIENTO Y GUARDADO ---
        function manualMove() {
            document.getElementById('arm1').style.transform = `rotate(${document.getElementById('inpA1').value}deg)`;
            document.getElementById('arm2').style.transform = `rotate(${document.getElementById('inpA2').value}deg)`;
        }

        function savePos() {
            const a1 = document.getElementById('inpA1').value;
            const a2 = document.getElementById('inpA2').value;
            savedPositions.push({a1, a2});
            renderList();
        }

        function renderList() {
            document.getElementById('posList').innerHTML = savedPositions.map((p, i) => `
                <div class="pos-card">
                    <span style="font-size:0.8rem">P${i+1}: ${p.a1}°, ${p.a2}°</span>
                    <div style="display:flex; gap:4px">
                        <button onclick="goTo(${p.a1}, ${p.a2})" style="background:#2ecc71; color:white; padding:4px 8px; font-size:0.7rem">IR</button>
                        <button onclick="eliminarPosicion(${i})" style="background:#e74c3c; color:white; padding:4px 8px; font-size:0.7rem">X</button>
                    </div>
                </div>
            `).join('');
        }

        function eliminarPosicion(index) {
            savedPositions.splice(index, 1);
            renderList();
        }

        function goTo(a1, a2) {
            document.getElementById('inpA1').value = a1;
            document.getElementById('inpA2').value = a2;
            manualMove();
        }

        // --- FÍSICA Y PINZA ---
        function toggleClaw() {
            isClawClosed = !isClawClosed;
            const cL = document.getElementById('cL'), cR = document.getElementById('cR');
            if (isClawClosed) {
                cL.style.transform = "translateX(18px)";
                cR.style.transform = "translateX(-18px)";
                const grip = cL.getBoundingClientRect();
                document.querySelectorAll('.piece').forEach(p => {
                    const pR = p.getBoundingClientRect();
                    if (Math.abs(grip.x - pR.x) < 50 && Math.abs(grip.y - pR.y) < 50 && !itemHeld) itemHeld = p;
                });
            } else {
                cL.style.transform = "translateX(0)";
                cR.style.transform = "translateX(0)";
                if(itemHeld) releasePiece();
            }
        }

        function releasePiece() {
            const p = itemHeld; itemHeld = null;
            let y = parseFloat(p.style.top);
            let x = parseFloat(p.style.left);
            const gravity = setInterval(() => {
                y += 7; p.style.top = y + "px";
                misionesActivas.forEach(m => {
                    if (y > window.innerHeight - 170 && Math.abs((x + 20) - m.xCenter) < 55) {
                        clearInterval(gravity);
                        p.style.top = (window.innerHeight - 140) + "px";
                        if (p.getAttribute('data-color') === m.color) {
                            puntos++;
                            document.getElementById('puntos').innerText = puntos;
                            p.style.opacity = "0.3";
                            if(puntos <= 6) setTimeout(setMision, 600); // En nivel 1, la caja cambia al acertar
                        }
                    }
                });
                if (y > window.innerHeight - 130) { clearInterval(gravity); setTimeout(() => p.remove(), 500); }
            }, 20);
        }

        function createPiece() {
            const keys = Object.keys(colors);
            const c = keys[Math.floor(Math.random()*5)];
            const p = document.createElement('div');
            p.className = 'piece';
            p.style.backgroundColor = colors[c];
            p.setAttribute('data-color', c);
            p.style.left = "-50px";
            p.style.top = (window.innerHeight - 130) + "px";
            document.getElementById('factory').appendChild(p);
            let xPos = -50;
            const belt = setInterval(() => {
                if (itemHeld === p) { clearInterval(belt); return; }
                xPos += 2; p.style.left = xPos + "px";
                if (xPos > window.innerWidth) { p.remove(); clearInterval(belt); }
            }, 30);
        }

        function enviarASheets() {
            if(enviado) return;
            enviado = true;
            document.getElementById('btn-sheets').disabled = true;
            document.getElementById('status-overlay').style.display = 'flex';
            document.getElementById('status-msg').innerText = "ENVIANDO DATOS...";

            const scriptUrl = "https://script.google.com/macros/s/AKfycbwVPttSZrhwfWwSZpFo7KWjJ39vldQm3MPGykMWEPWOoF4UsZ24mC8YhgiaE-0xm_7G/exec";
            fetch(scriptUrl, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ player1: "Robot " + operarioNombre, score1: puntos, player2: "---", score2: 0, timestamp: new Date().toLocaleString() })
            }).then(() => {
                document.getElementById('status-msg').innerText = "¡REGISTRADO CON ÉXITO!";
                setTimeout(() => { document.getElementById('status-overlay').style.display = 'none'; }, 2000);
            });
        }

        setInterval(() => {
            if (itemHeld) {
                const g = document.getElementById('cL').getBoundingClientRect();
                const f = document.getElementById('factory').getBoundingClientRect();
                itemHeld.style.left = (g.left - f.left + 20) + "px";
                itemHeld.style.top = (g.top - f.top + 20) + "px";
            }
        }, 16);

        setInterval(createPiece, 4000);
    </script>
</body>
</html>
