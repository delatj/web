<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Evaluación: IA</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #8e44ad;
            --success: #27ae60;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; max-width: 600px; width: 100%; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        .user-info { margin-bottom: 25px; padding: 15px; background: #f3e5f5; border-radius: 8px; }
        .user-info input { width: 90%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .question { margin-bottom: 25px; padding: 15px; border: 1px solid #eee; border-radius: 8px; background: #fff; }
        .question p { font-weight: bold; margin-top: 0; }
        .options label { display: block; padding: 8px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .options label:hover { background: #f0f0f0; }
        .options input { margin-right: 10px; }
        #btn-enviar { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #btn-enviar:hover { background: #219150; }
        #status-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; color: white; text-align: center; }
        .result-box { background: white; color: #333; padding: 30px; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Evaluación IA</h1>
        <div class="user-info">
            <label for="nombre">Nombre y Apellidos del Alumno:</label>
            <input type="text" id="nombre" placeholder="Escribe tu nombre aquí...">
        </div>
        <form id="quiz-form">
            <div id="questions-container"></div>
            <button type="button" id="btn-enviar" onclick="corregirYEnviar()">ENVIAR EXAMEN AL PROFESOR</button>
        </form>
    </div>

    <div id="status-overlay">
        <div class="result-box" id="result-content">
            <h2 id="status-text">Enviando resultados...</h2>
        </div>
    </div>

    <script>
        const questionsData = [
            { q: "¿Qué hemos utilizado en las prácticas dentro del lenguaje supervisado para que el programa ordenador reconozca algo?", options: [{ text: "Etiquetas", val: 20 }, { text: "Precintos", val: 0 }, { text: "Captura de pantallas", val: 0 }, { text: "Audios", val: 0 }] },
            { q: "¿Qué tipo de lenguaje de inteligencia artificial se utiliza para que aprendan a jugar los juegos de ajedrez?", options: [{ text: "Supervisado", val: 0 }, { text: "No supervisado", val: 0 }, { text: "Semi supervisado", val: 0 }, { text: "Por refuerzo", val: 20 }] },
            { q: "En la práctica de 'triste y contento', ¿por qué es más difícil que el ordenador reconozca esas opciones que un estuche o lápiz?", options: [{ text: "Porque un estuche y un lápiz se parecen menos entre ellos.", val: 20 }, { text: "Porque las caras son más difíciles de entender para el ordenador.", val: 0 }, { text: "Porque el programa no procesa bien las fotos de caras.", val: 0 }, { text: "Porque le hemos puesto menos fotos de caras.", val: 0 }] },
            { q: "¿Cómo podemos conseguir que el reconocimiento de imágenes sea más efectivo, dentro de nuestras posibilidades?", options: [{ text: "Añadiendo más etiquetas a cada uno de los elementos.", val: 20 }, { text: "Editando el código del programa y reestructurándolo.", val: 0 }, { text: "Cogiendo solo una parte del objeto que queremos identificar.", val: 0 }] },
            { q: "Cuando el código se programa deliberadamente para que ciertas imágenes no se reconozcan correctamente con fines económicos, hablamos de un...", options: [{ text: "Sesgo", val: 20 }, { text: "Scraping", val: 0 }, { text: "Phishing", val: 0 }, { text: "Ataque de fuerza", val: 0 }] }
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function renderTest() {
            const container = document.getElementById('questions-container');
            const shuffledQuestions = shuffle([...questionsData]);
            shuffledQuestions.forEach((questionObj, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question';
                let optionsHtml = '';
                const shuffledOptions = shuffle([...questionObj.options]);
                shuffledOptions.forEach(opt => {
                    optionsHtml += `<label><input type="radio" name="q${index}" value="${opt.val}"> ${opt.text}</label>`;
                });
                qDiv.innerHTML = `<p>${index + 1}. ${questionObj.q}</p><div class="options">${optionsHtml}</div>`;
                container.appendChild(qDiv);
            });
        }

        function corregirYEnviar() {
            const nombreAlumno = document.getElementById('nombre').value.trim();
            if (!nombreAlumno) { alert("Por favor, escribe tu nombre."); return; }

            const form = document.getElementById('quiz-form');
            const dataForm = new FormData(form);
            let notaFinal = 0;
            let contestadas = 0;

            for (let value of dataForm.values()) {
                notaFinal += parseInt(value);
                contestadas++;
            }

            if (contestadas < 5 && !confirm("No has respondido todo. ¿Enviar igualmente?")) return;

            document.getElementById('btn-enviar').disabled = true;
            document.getElementById('status-overlay').style.display = 'flex';

            const scriptUrl = "https://script.google.com/macros/s/AKfycbwVPttSZrhwfWwSZpFo7KWjJ39vldQm3MPGykMWEPWOoF4UsZ24mC8YhgiaE-0xm_7G/exec";
            
            // Estructura de envío limpia
            const dataEnvio = {
                player1: nombreAlumno,      // Columna 1: Solo nombre
                score1: notaFinal.toString(), // Columna 2: El número como texto para evitar el error de 2000%
                player2: "IA",              // Columna 3: Solo las siglas
                score2: "0",
                timestamp: new Date().toLocaleString()
            };

            fetch(scriptUrl, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(dataEnvio)
            }).then(() => {
                document.getElementById('status-text').innerHTML = `
                    <h2 style="color: #27ae60">¡Examen Enviado!</h2>
                    <p>Alumno: <b>${nombreAlumno}</b></p>
                    <p>Puntuación: <b>${notaFinal}</b></p>
                `;
            }).catch(err => {
                alert("Error. Reinténtalo.");
                document.getElementById('btn-enviar').disabled = false;
            });
        }

        window.onload = renderTest;
    </script>
</body>
</html>
