<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recortar MP3 y Fade Out (9 Segundos)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #2a2a40;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }
        input[type="file"] {
            margin: 15px 0;
            padding: 10px;
            background: #3f3f5a;
            border-radius: 6px;
            width: 90%;
            color: white;
        }
        .time-controls {
            background: #1e1e2f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .time-controls input {
            width: 60px;
            padding: 8px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #2a2a40;
            color: white;
            text-align: center;
            font-size: 16px;
        }
        button {
            background-color: #00e5ff;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        button:hover {
            background-color: #00b3cc;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            min-height: 20px;
        }
        .download-btn {
            display: inline-block;
            margin-top: 20px;
            background-color: #ff0055;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 6px;
            display: none;
            transition: background 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
        .download-btn:hover {
            background-color: #cc0044;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>✂️ Recortar y Fade Out (9s)</h2>
        <p>Sube tu MP3, elige cuánto debe durar en total, y se aplicará un fundido en los últimos 9 segundos de ese fragmento.</p>
        
        <input type="file" id="audioInput" accept="audio/mpeg, audio/mp3">
        
        <div class="time-controls">
            <label>Duración final:</label>
            <input type="number" id="inputMin" placeholder="0" min="0" value="0"> min
            <input type="number" id="inputSec" placeholder="0" min="0" max="59" value="30"> seg
        </div>

        <button id="processBtn">Procesar MP3</button>
        
        <div id="status"></div>
        
        <a id="downloadLink" class="download-btn">⬇️ Descargar MP3 Listo</a>
    </div>

    <script>
        const audioInput = document.getElementById('audioInput');
        const inputMin = document.getElementById('inputMin');
        const inputSec = document.getElementById('inputSec');
        const processBtn = document.getElementById('processBtn');
        const statusText = document.getElementById('status');
        const downloadLink = document.getElementById('downloadLink');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        processBtn.addEventListener('click', async () => {
            if (audioInput.files.length === 0) {
                alert('Por favor, selecciona un archivo MP3 primero.');
                return;
            }

            // Calcular el tiempo deseado en segundos
            const mins = parseInt(inputMin.value) || 0;
            const secs = parseInt(inputSec.value) || 0;
            let targetDuration = (mins * 60) + secs;

            if (targetDuration <= 0) {
                alert('Por favor, introduce una duración mayor a 0 segundos.');
                return;
            }

            const file = audioInput.files[0];
            statusText.innerText = 'Cortando y convirtiendo a MP3... (espera unos segundos)';
            processBtn.disabled = true;
            downloadLink.style.display = 'none';

            try {
                // 1. Decodificar el archivo original
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                const originalDuration = audioBuffer.duration;

                if (targetDuration > originalDuration) {
                    targetDuration = originalDuration;
                }
                
                // 2. Crear contexto offline con la duración EXACTA del recorte
                const offlineCtx = new OfflineAudioContext(
                    audioBuffer.numberOfChannels,
                    targetDuration * audioBuffer.sampleRate,
                    audioBuffer.sampleRate
                );

                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;
                const gainNode = offlineCtx.createGain();

                // 3. Aplicar Fade Out (últimos 9 segundos del recorte)
                const fadeDuration = 9; // <--- AQUÍ ESTÁ EL CAMBIO A 9 SEGUNDOS
                const fadeStartTime = Math.max(0, targetDuration - fadeDuration);

                gainNode.gain.setValueAtTime(1, 0);
                gainNode.gain.setValueAtTime(1, fadeStartTime);
                gainNode.gain.linearRampToValueAtTime(0, targetDuration);

                source.connect(gainNode);
                gainNode.connect(offlineCtx.destination);
                source.start(0);

                // 4. Renderizar
                const renderedBuffer = await offlineCtx.startRendering();
                
                // 5. Convertir a MP3 usando lamejs
                statusText.innerText = 'Comprimiendo a MP3...';
                
                await new Promise(r => setTimeout(r, 50)); 
                
                const mp3Blob = await encodeToMp3(renderedBuffer);
                const url = URL.createObjectURL(mp3Blob);

                // 6. Preparar descarga
                downloadLink.href = url;
                downloadLink.download = 'recorte_' + targetDuration + 's_' + file.name.replace(/\.[^/.]+$/, "") + '.mp3';
                downloadLink.style.display = 'inline-block';
                statusText.innerText = '¡Proceso completado con éxito!';

            } catch (error) {
                console.error(error);
                statusText.innerText = 'Hubo un error al procesar el audio.';
            } finally {
                processBtn.disabled = false;
            }
        });

        // Función para codificar AudioBuffer a Blob MP3 usando lamejs
        function encodeToMp3(buffer) {
            return new Promise((resolve) => {
                const channels = buffer.numberOfChannels;
                const sampleRate = buffer.sampleRate;
                const kbps = 192;

                const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, kbps);
                const mp3Data = [];

                const left = buffer.getChannelData(0);
                const right = channels > 1 ? buffer.getChannelData(1) : left;

                const sampleBlockSize = 1152;
                const leftInt16 = new Int16Array(left.length);
                const rightInt16 = new Int16Array(right.length);

                for (let i = 0; i < left.length; i++) {
                    let l = Math.max(-1, Math.min(1, left[i]));
                    let r = Math.max(-1, Math.min(1, right[i]));
                    leftInt16[i] = l < 0 ? l * 32768 : l * 32767;
                    rightInt16[i] = r < 0 ? r * 32768 : r * 32767;
                }

                for (let i = 0; i < leftInt16.length; i += sampleBlockSize) {
                    const leftChunk = leftInt16.subarray(i, i + sampleBlockSize);
                    const rightChunk = rightInt16.subarray(i, i + sampleBlockSize);
                    
                    let mp3buf;
                    if (channels === 2) {
                        mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
                    } else {
                        mp3buf = mp3encoder.encodeBuffer(leftChunk);
                    }
                    
                    if (mp3buf.length > 0) {
                        mp3Data.push(new Int8Array(mp3buf));
                    }
                }

                const mp3buf = mp3encoder.flush();
                if (mp3buf.length > 0) {
                    mp3Data.push(new Int8Array(mp3buf));
                }

                resolve(new Blob(mp3Data, { type: 'audio/mp3' }));
            });
        }
    </script>
</body>
</html>
