<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Herramienta PDF - Todo en Uno</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f3; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        h3 { font-size: 1.1em; color: #34495e; margin-bottom: 15px; display: flex; align-items: center; }
        .box { background: #f8f9fa; border: 1px solid #e1e4e8; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 0.9em; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Colores de botones */
        .btn-camera { background-color: #3498db; color: white; }
        .btn-camera:hover { background-color: #2980b9; }
        .btn-download { background-color: #2ecc71; color: white; }
        .btn-merge { background-color: #9b59b6; color: white; }
        .btn-split { background-color: #e67e22; color: white; }
        
        .status-text { font-size: 0.85em; color: #7f8c8d; text-align: center; margin-top: -5px; margin-bottom: 10px; font-weight: 500; }
        .info-tag { font-size: 0.75em; color: #95a5a6; font-style: italic; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛠️ Súper PDF Tool</h2>

    <div class="box">
        <h3>1. De Cámara/Imagen a PDF</h3>
        <input type="text" id="pdfNameImg" placeholder="Nombre del PDF..." value="Mis_Fotos">
        <input type="file" id="imgInput" accept="image/*" capture="environment" multiple style="display:none">
        <button class="btn-camera" onclick="document.getElementById('imgInput').click()">📸 Tomar Foto o Subir Imágenes</button>
        <div id="statusImg" class="status-text">Imágenes seleccionadas: 0</div>
        <button class="btn-download" onclick="generarPDFDesdeImagenes()">Descargar PDF de Fotos</button>
    </div>

    <div class="box">
        <h3>2. Unir varios archivos PDF</h3>
        <input type="file" id="mergeInput" accept="application/pdf" multiple style="display:none">
        <button class="btn-merge" onclick="document.getElementById('mergeInput').click()">📂 Seleccionar varios PDFs</button>
        <div id="statusMerge" class="status-text">PDFs para unir: 0</div>
        <button class="btn-download" style="background-color: #8e44ad;" onclick="unirPDFs()">Unir y Descargar PDF</button>
        <div class="info-tag">* Puedes elegir varios archivos a la vez.</div>
    </div>

    <div class="box">
        <h3>3. Dividir / Extraer Páginas</h3>
        <input type="file" id="splitInput" accept="application/pdf">
        <label>Páginas (ej: 1, 3, 5-10):</label>
        <input type="text" id="pageRange" placeholder="Ej: 1, 2, 5-8">
        <button class="btn-split" onclick="dividirPDF()">Extraer y Descargar</button>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let selectedImages = [];

    // --- LÓGICA DE IMÁGENES ---
    document.getElementById('imgInput').addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        selectedImages = selectedImages.concat(files);
        document.getElementById('statusImg').innerText = `Imágenes seleccionadas: ${selectedImages.length}`;
    });

    async function generarPDFDesdeImagenes() {
        if (selectedImages.length === 0) return alert("Primero selecciona imágenes o haz una foto.");
        const doc = new jsPDF();
        const fileName = document.getElementById('pdfNameImg').value || "documento";

        for (let i = 0; i < selectedImages.length; i++) {
            const imgData = await fileToCanvasData(selectedImages[i]);
            const orientation = imgData.width > imgData.height ? 'l' : 'p';
            
            if (i === 0) doc.deletePage(1); 
            doc.addPage([imgData.width, imgData.height], orientation);
            
            const pW = doc.internal.pageSize.getWidth();
            const pH = doc.internal.pageSize.getHeight();
            doc.addImage(imgData.data, 'JPEG', 0, 0, pW, pH);
        }
        doc.save(`${fileName}.pdf`);
    }

    function fileToCanvasData(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    resolve({ data: canvas.toDataURL('image/jpeg', 0.8), width: img.width, height: img.height });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // --- LÓGICA DE UNIR PDFS (NUEVO) ---
    document.getElementById('mergeInput').addEventListener('change', function(e) {
        const count = e.target.files.length;
        document.getElementById('statusMerge').innerText = `PDFs para unir: ${count}`;
    });

    async function unirPDFs() {
        const files = document.getElementById('mergeInput').files;
        if (files.length < 2) return alert("Selecciona al menos 2 archivos PDF para unir.");

        const mergedPdf = await PDFLib.PDFDocument.create();

        for (let file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
            const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
            copiedPages.forEach((page) => mergedPdf.addPage(page));
        }

        const pdfBytes = await mergedPdf.save();
        downloadBlob(pdfBytes, "PDF_Unido.pdf");
    }

    // --- LÓGICA DE DIVIDIR PDF ---
    async function dividirPDF() {
        const file = document.getElementById('splitInput').files[0];
        const range = document.getElementById('pageRange').value;
        if (!file || !range) return alert("Selecciona un archivo y las páginas.");

        const arrayBuffer = await file.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
        const newPdf = await PDFLib.PDFDocument.create();
        const total = pdfDoc.getPageCount();

        const pagesToExtract = [];
        range.split(',').forEach(p => {
            if (p.includes('-')) {
                const [s, e] = p.split('-').map(Number);
                for (let i = s; i <= e; i++) pagesToExtract.push(i);
            } else {
                pagesToExtract.push(Number(p.trim()));
            }
        });

        for (let pNum of pagesToExtract) {
            if (pNum > 0 && pNum <= total) {
                const [page] = await newPdf.copyPages(pdfDoc, [pNum - 1]);
                newPdf.addPage(page);
            }
        }

        const pdfBytes = await newPdf.save();
        downloadBlob(pdfBytes, "PDF_Extraido.pdf");
    }

    function downloadBlob(data, fileName) {
        const blob = new Blob([data], { type: "application/pdf" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
    }
</script>

</body>
</html>
