<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📸 Conversor PDF - Smartphone Total</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f0f4f8; font-family: system-ui, -apple-system, sans-serif; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; max-width: 500px; width: 100%; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); padding: 20px; }
        h1 { font-size: 1.4rem; color: #1e293b; text-align: center; margin-bottom: 15px; }
        .input-name { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; margin-bottom: 15px; font-size: 1rem; }
        .box { background: #f8fafc; border: 2px dashed #3b82f6; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .box label { display: block; font-weight: bold; color: #1e3a8a; margin-bottom: 8px; }
        .input-file { width: 100%; font-size: 0.9rem; }
        .counter { background: #dcfce7; color: #14532d; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 1.1rem; }
        .btn-send { background: #16a34a; color: white; border: none; width: 100%; padding: 16px; font-size: 1.1rem; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-reset { background: #fee2e2; color: #991b1b; border: none; width: 100%; padding: 8px; border-radius: 8px; margin-top: 10px; cursor: pointer; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>📄 Convertir a PDF (Formato Vertical)</h1>
    
    <input type="text" id="pdfName" class="input-name" placeholder="Nombre del PDF" value="Mis_Fotos">

    <div class="box">
        <label>📷 HACER FOTO AHORA</label>
        <input type="file" id="camInput" accept="image/*" capture="environment" class="input-file">
    </div>

    <div class="box">
        <label>📁 SELECCIONAR DE LA GALERÍA</label>
        <input type="file" id="galInput" multiple class="input-file">
    </div>

    <div id="statusCounter" class="counter">
        📸 Archivos listos: <span id="numFiles">0</span>
    </div>

    <button id="processBtn" class="btn-send">⬇️ GENERAR PDF PERFECTO ⬇️</button>
    <button id="resetBtn" class="btn-reset">🗑️ Vaciar lista</button>
</div>

<script>
    (function(){
        const camInput = document.getElementById('camInput');
        const galInput = document.getElementById('galInput');
        const numFiles = document.getElementById('numFiles');
        const processBtn = document.getElementById('processBtn');
        const resetBtn = document.getElementById('resetBtn');
        const pdfName = document.getElementById('pdfName');

        let fileList = [];

        function refreshCounter() {
            numFiles.innerText = fileList.length;
        }

        // AGREGAR ARCHIVOS SIN NINGÚN FILTRO (Evita el error de "Hecho" vacío)
        function addFilesToList(files) {
            if (!files || files.length === 0) return;
            for(let i=0; i<files.length; i++) {
                fileList.push(files[i]);
            }
            refreshCounter();
        }

        camInput.addEventListener('change', function() { addFilesToList(this.files); });
        galInput.addEventListener('change', function() { addFilesToList(this.files); });

        function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Fuerza la orientación vertical si la foto está tumbada
                        if (img.width > img.height) {
                            canvas.width = img.height;
                            canvas.height = img.width;
                            ctx.translate(canvas.width / 2, canvas.height / 2);
                            ctx.rotate(90 * Math.PI / 180);
                            ctx.drawImage(img, -img.width / 2, -img.height / 2);
                        } else {
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);
                        }

                        resolve({
                            url: canvas.toDataURL('image/jpeg', 0.85),
                            w: canvas.width,
                            h: canvas.height
                        });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function savePDF() {
            if (fileList.length === 0) {
                alert("⚠️ Error: No has seleccionado ningún archivo o el móvil bloqueó la carga.");
                return;
            }

            let doc = null;

            for (let i = 0; i < fileList.length; i++) {
                try {
                    const { url, w, h } = await processImage(fileList[i]);
                    const mm = 0.264583;
                    const pW = w * mm;
                    const pH = h * mm;

                    // Reducción del 20% (Imagen al 80% de su tamaño)
                    const sW = pW * 0.80;
                    const sH = pH * 0.80;
                    const mx = (pW - sW) / 2;
                    const my = (pH - sH) / 2;

                    if (i === 0) {
                        doc = new jspdf.jsPDF({ orientation: pW > pH ? 'l' : 'p', unit: 'mm', format: [pW, pH] });
                    } else {
                        doc.addPage([pW, pH], pW > pH ? 'l' : 'p');
                    }

                    doc.addImage(url, 'JPEG', mx, my, sW, sH, undefined, 'FAST');
                } catch (err) {
                    console.error(err);
                }
            }

            if (doc) {
                doc.save((pdfName.value.trim() || "documento") + ".pdf");
                alert("🎉 ¡PDF creado con éxito!");
                fileList = [];
                camInput.value = '';
                galInput.value = '';
                refreshCounter();
            }
        }

        processBtn.addEventListener('click', savePDF);
        resetBtn.addEventListener('click', () => { fileList = []; camInput.value = ''; galInput.value = ''; refreshCounter(); });
    })();
</script>
</body>
</html>
