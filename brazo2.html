<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Robot Duel - Versión Final Completa</title>
    <style>
        :root {
            --dark: #1a1a1a; --panel: #2c3e50; --accent: #f1c40f;
            --robot1: #ecf0f1; --robot2: #bdc3c7; --belt: #34495e; 
            --primary: #2ecc71; --danger: #e74c3c;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; background: #222; }

        #split-bg { position: fixed; inset: 0; display: flex; z-index: -1; }
        .bg-half { 
            flex: 1; transition: background 0.8s ease; 
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 120px;
        }
        .player-name-display {
            font-size: 3rem; font-weight: bold; color: rgba(255,255,255,0.2);
            text-transform: uppercase; letter-spacing: 5px; pointer-events: none;
        }
        #bg-p1 { background: #2a3a4a; border-right: 2px solid rgba(255,255,255,0.1); }
        #bg-p2 { background: #2a3a4a; }

        #modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: flex; justify-content: center; align-items: center; z-index: 2000; 
        }
        .modal-content { background: white; color: #333; padding: 30px; border-radius: 15px; text-align: center; width: 350px; }
        input { padding: 10px; margin: 10px; width: 80%; border: 2px solid #ddd; border-radius: 5px; }

        .top-bar {
            display: flex; justify-content: space-around; height: 100px;
            background: rgba(0,0,0,0.7); border-bottom: 4px solid var(--accent);
            position: relative; z-index: 100;
        }
        .score-card { text-align: center; min-width: 150px; }
        .score-val { font-size: 3rem; font-weight: bold; color: var(--accent); margin: 0; }

        #factory { position: relative; width: 100%; height: calc(100vh - 100px); overflow: hidden; }

        .btn-sheets {
            background: var(--primary); color: white; border: none; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px;
        }

        #status-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; justify-content: center; 
            align-items: center; z-index: 2001; 
        }
        #status-msg { background: white; padding: 25px; border-radius: 8px; color: #155724; font-weight: bold; border: 4px solid var(--primary); }

        .conveyor-belt {
            position: absolute; bottom: 120px; width: 100%; height: 35px;
            background: #444; border-top: 4px solid #111; border-bottom: 4px solid #111;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, #222 42px);
            animation: moveBelt 2s linear infinite;
        }
        @keyframes moveBelt { from { background-position: 0 0; } to { background-position: 84px 0; } }

        .delivery-zone { position: absolute; bottom: 0; width: 110px; transition: all 0.5s ease; z-index: 10; }
        .box { position: relative; width: 110px; height: 60px; border: 4px solid #fff; border-top: none; background: rgba(255,255,255,0.1); }
        .pedestal { width: 110px; height: 180px; background: #444; border: 2px solid #222; }
        .box-label { background: white; color: black; font-size: 0.7rem; font-weight: bold; text-align: center; padding: 2px; }

        .robot-system { position: absolute; bottom: 160px; z-index: 100; }
        .link { position: absolute; bottom: 0; width: 25px; background: var(--robot1); border: 2px solid #555; border-radius: 12px; transform-origin: bottom center; }
        .link-main { height: 160px; left: -12px; } 
        .link-sub { height: 140px; bottom: 150px; left: -2px; width: 20px; }
        .gripper { position: absolute; bottom: 130px; left: -25px; width: 70px; height: 8px; background: #666; }
        .claw { position: absolute; width: 10px; height: 30px; background: var(--danger); transition: 0.1s; }

        .piece { position: absolute; width: 30px; height: 30px; border-radius: 4px; z-index: 50; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="split-bg">
        <div id="bg-p1" class="bg-half"><div id="disp-n1" class="player-name-display">P1</div></div>
        <div id="bg-p2" class="bg-half"><div id="disp-n2" class="player-name-display">P2</div></div>
    </div>

    <div id="status-overlay"><div id="status-msg"></div></div>

    <div id="modal">
        <div class="modal-content">
            <h2>DUELO INDUSTRIAL</h2>
            <p>P1: Rojas 🔴 | P2: Azules 🔵<br>Fondo cambia con los puntos</p>
            <input type="text" id="name1" placeholder="Nombre Jugador Izq">
            <input type="text" id="name2" placeholder="Nombre Jugador Der">
            <button onclick="startGame()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; cursor:pointer; font-weight:bold; border-radius:5px;">INICIAR</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="score-card"><div id="score-n1">J1</div><div class="score-val" id="score1">0</div></div>
        <div style="align-self:center; text-align:center;">
            <b>META: 20 PUNTOS</b><br>
            <button id="btn-sheets" class="btn-sheets" onclick="enviarASheets()">ENVIAR A SHEETS</button>
        </div>
        <div class="score-card"><div id="score-n2">J2</div><div class="score-val" id="score2">0</div></div>
    </div>

    <div id="factory">
        <div class="conveyor-belt"></div>
        <div id="zone-p1" class="delivery-zone" style="left: 5%;">
            <div class="box" style="border-color: #e74c3c;"><div class="box-label">SOLO ROJO</div></div>
            <div class="pedestal"></div>
        </div>
        <div id="zone-p2" class="delivery-zone" style="right: 5%;">
            <div class="box" style="border-color: #3498db;"><div class="box-label">SOLO AZUL</div></div>
            <div class="pedestal"></div>
        </div>
        <div id="p1-system" class="robot-system" style="left: 25%;">
            <div class="link link-main" id="p1-arm1"><div class="link link-sub" id="p1-arm2"><div class="gripper"><div class="claw" id="p1-cL" style="left: 5px; bottom: -25px;"></div><div class="claw" id="p1-cR" style="right: 5px; bottom: -25px;"></div></div></div></div>
        </div>
        <div id="p2-system" class="robot-system" style="right: 25%;">
            <div class="link link-main" id="p2-arm1" style="background: #95a5a6;"><div class="link link-sub" id="p2-arm2" style="background: #95a5a6;"><div class="gripper"><div class="claw" id="p2-cL" style="left: 5px; bottom: -25px;"></div><div class="claw" id="p2-cR" style="right: 5px; bottom: -25px;"></div></div></div></div>
        </div>
    </div>

    <script>
        const state = {
            p1: { a1: -20, a2: 40, claw: false, score: 0, held: null, name: "", enviado: false },
            p2: { a1: 20, a2: -40, claw: false, score: 0, held: null, name: "" },
            factory: document.getElementById('factory')
        };

        function getColorByScore(score) {
            if (score > 20) return "#a4262c";
            if (score >= 16) return "#d35400";
            if (score >= 11) return "#d29200";
            if (score >= 6) return "#107c10";
            return "#2a3a4a";
        }

        function updateBackgrounds() {
            document.getElementById('bg-p1').style.background = getColorByScore(state.p1.score);
            document.getElementById('bg-p2').style.background = getColorByScore(state.p2.score);
        }

        function startGame() {
            state.p1.name = document.getElementById('name1').value || "Jugador 1";
            state.p2.name = document.getElementById('name2').value || "Jugador 2";
            document.getElementById('disp-n1').innerText = state.p1.name;
            document.getElementById('disp-n2').innerText = state.p2.name;
            document.getElementById('score-n1').innerText = state.p1.name;
            document.getElementById('score-n2').innerText = state.p2.name;
            document.getElementById('modal').style.display = 'none';
            setInterval(spawnPiece, 2000);
            gameLoop();
        }

        function relocateBox(player) {
            const newPos = Math.floor(Math.random() * 30) + 2; 
            const zone = document.getElementById('zone-' + player);
            if(player === 'p1') zone.style.left = newPos + "%";
            else zone.style.right = newPos + "%";
        }

        function spawnPiece() {
            const isRed = Math.random() > 0.5;
            const p = document.createElement('div');
            p.className = 'piece';
            p.dataset.color = isRed ? 'red' : 'blue';
            p.style.backgroundColor = isRed ? '#e74c3c' : '#3498db';
            p.style.left = (window.innerWidth / 2 - 15) + "px";
            p.style.top = "0px";
            state.factory.appendChild(p);

            let py = 0; let px = window.innerWidth / 2 - 15;
            let onBelt = false; const direction = Math.random() > 0.5 ? 2.5 : -2.5;

            const fallAnim = setInterval(() => {
                if (p.dataset.held === "true") { clearInterval(fallAnim); return; }
                if (!onBelt) {
                    py += 6;
                    if (py >= (window.innerHeight - 245)) { py = window.innerHeight - 245; onBelt = true; }
                } else { px += direction; }
                p.style.top = py + "px"; p.style.left = px + "px";
                if (px < -50 || px > window.innerWidth + 50) { clearInterval(fallAnim); p.remove(); }
            }, 20);
        }

        function toggleClaw(p) {
            state[p].claw = !state[p].claw;
            const cL = document.getElementById(p + '-cL');
            const cR = document.getElementById(p + '-cR');
            if (state[p].claw) {
                cL.style.transform = "translateX(8px)"; cR.style.transform = "translateX(-8px)";
                const rect = cL.getBoundingClientRect();
                document.querySelectorAll('.piece').forEach(piece => {
                    const pRect = piece.getBoundingClientRect();
                    if (Math.hypot(rect.x - pRect.x, rect.y - pRect.y) < 60 && !state[p].held && !piece.dataset.held) {
                        state[p].held = piece; piece.dataset.held = "true";
                    }
                });
            } else {
                cL.style.transform = "translateX(0)"; cR.style.transform = "translateX(0)";
                if (state[p].held) dropPiece(p);
            }
        }

        function dropPiece(p) {
            const piece = state[p].held;
            const pColor = piece.dataset.color;
            state[p].held = null; piece.dataset.held = "false";

            const gravity = setInterval(() => {
                let py = parseFloat(piece.style.top) + 10;
                let px = parseFloat(piece.style.left);
                piece.style.top = py + "px";

                if (py > window.innerHeight - 300) {
                    const box1 = document.getElementById('zone-p1').getBoundingClientRect();
                    const box2 = document.getElementById('zone-p2').getBoundingClientRect();

                    if (px > box1.left && px < box1.right) {
                        if (pColor === 'red') {
                            state.p1.score++;
                            document.getElementById('score1').innerText = state.p1.score;
                            if(state.p1.score % 2 === 0) relocateBox('p1');
                            updateBackgrounds();
                        }
                        clearInterval(gravity); piece.remove();
                    } 
                    else if (px > box2.left && px < box2.right) {
                        if (pColor === 'blue') {
                            state.p2.score++;
                            document.getElementById('score2').innerText = state.p2.score;
                            if(state.p2.score % 2 === 0) relocateBox('p2');
                            updateBackgrounds();
                        }
                        clearInterval(gravity); piece.remove();
                    }
                }
                if (py > window.innerHeight) { clearInterval(gravity); piece.remove(); }
            }, 20);
        }

        function enviarASheets() {
            if(state.p1.enviado) return;
            state.p1.enviado = true;
            document.getElementById('btn-sheets').disabled = true;
            document.getElementById('status-overlay').style.display = 'flex';
            document.getElementById('status-msg').innerText = "REGISTRANDO...";

            const scriptUrl = "https://script.google.com/macros/s/AKfycbwVPttSZrhwfWwSZpFo7KWjJ39vldQm3MPGykMWEPWOoF4UsZ24mC8YhgiaE-0xm_7G/exec";
            fetch(scriptUrl, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ player1: state.p1.name, score1: state.p1.score, player2: state.p2.name, score2: state.p2.score, timestamp: new Date().toLocaleString() })
            }).then(() => {
                document.getElementById('status-msg').innerText = "¡ÉXITO!";
                setTimeout(() => { 
                    document.getElementById('status-overlay').style.display = 'none';
                    state.p1.enviado = false;
                    document.getElementById('btn-sheets').disabled = false;
                }, 2000);
            });
        }

        const keys = {};
        window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'Space') toggleClaw('p1'); if(e.code === 'Enter') toggleClaw('p2'); };
        window.onkeyup = (e) => keys[e.code] = false;

        function gameLoop() {
            const speed = 2.5;
            if(keys['KeyW']) state.p1.a1 -= speed; if(keys['KeyS']) state.p1.a1 += speed;
            if(keys['KeyA']) state.p1.a2 -= speed; if(keys['KeyD']) state.p1.a2 += speed;
            if(keys['ArrowUp']) state.p2.a1 -= speed; if(keys['ArrowDown']) state.p2.a1 += speed;
            if(keys['ArrowLeft']) state.p2.a2 -= speed; if(keys['ArrowRight']) state.p2.a2 += speed;
            updateRobot('p1'); updateRobot('p2');
            requestAnimationFrame(gameLoop);
        }

        function updateRobot(p) {
            document.getElementById(p + '-arm1').style.transform = `rotate(${state[p].a1}deg)`;
            document.getElementById(p + '-arm2').style.transform = `rotate(${state[p].a2}deg)`;
            if (state[p].held) {
                const rect = document.getElementById(p + '-cL').getBoundingClientRect();
                const f = state.factory.getBoundingClientRect();
                state[p].held.style.left = (rect.left - f.left + 5) + "px";
                state[p].held.style.top = (rect.top - f.top + 15) + "px";
            }
        }
    </script>
</body>
</html>
