<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unificador de HTML con Índice (Marcos)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #2c3e50; }
        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        input[type="file"] { padding: 10px; border: 1px dashed #ccc; border-radius: 4px; }
        button {
            padding: 10px 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background-color: #219150; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <h2>🔗 Unificador de HTML (Con Marcos)</h2>
    <p style="text-align: center; font-size: 0.9em; color: #666;">
        Selecciona tus archivos y obtén un único HTML con índice y secciones enmarcadas.
    </p>
    
    <div class="controls">
        <label for="fileInput">Selecciona los archivos HTML que quieres unir:</label>
        <input type="file" id="fileInput" multiple accept=".html, .htm">
        
        <button onclick="unirArchivos()">Unir y Descargar HTML Final</button>
    </div>

    <div id="status"></div>

    <script>
        async function unirArchivos() {
            const input = document.getElementById('fileInput');
            const statusDiv = document.getElementById('status');

            if (input.files.length === 0) {
                alert('Por favor, selecciona al menos un archivo HTML.');
                return;
            }

            statusDiv.style.color = "#e67e22";
            statusDiv.innerHTML = '⏳ Procesando y uniendo archivos...';

            // Estructura base del nuevo archivo HTML con los estilos actualizados para los marcos
            let htmlFinal = `<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minilibros</title>
    <style>
        /* Fondo general grisáceo para que los folios blancos destaquen */
        body { 
            font-family: Arial, sans-serif; 
            line-height: 1.6; 
            color: #333; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 30px 20px; 
            background-color: #e9ecef; 
        }
        
        /* Estilos para el índice (ahora también parece un folio) */
        .indice { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 8px; 
            border: 2px solid #bdc3c7; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            margin-bottom: 40px; 
        }
        .indice h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px;}
        .indice ul { list-style-type: none; padding-left: 0; }
        .indice li { margin: 12px 0; }
        .indice a { text-decoration: none; color: #3498db; font-weight: bold; font-size: 1.1em; display: block; padding: 5px;}
        .indice a:hover { background-color: #f1f8ff; border-radius: 4px; color: #2980b9; }
        
        /* ESTILOS CLAVE: Aquí creamos el marco simulando un folio o página separada */
        .seccion { 
            background: #ffffff; /* Fondo blanco */
            padding: 40px;       /* Espacio interior para que el texto respire */
            margin-bottom: 40px; /* Separación entre cada archivo */
            border: 2px solid #bdc3c7; /* El marco gris oscuro que delimita el archivo */
            border-radius: 8px;  /* Bordes ligeramente redondeados */
            box-shadow: 0 6px 12px rgba(0,0,0,0.08); /* Sombra para dar profundidad */
        }
        
        .titulo-seccion { 
            background: #2c3e50; 
            color: white; 
            padding: 12px 20px; 
            border-radius: 4px; 
            margin-top: 0;
            margin-bottom: 25px;
        }
        
        .volver-arriba { 
            display: inline-block; 
            margin-top: 30px; 
            padding: 10px 15px;
            background-color: #ecf0f1;
            border-radius: 4px;
            font-size: 0.9em; 
            color: #2c3e50; 
            text-decoration: none; 
            font-weight: bold;
        }
        .volver-arriba:hover { background-color: #bdc3c7; }
        
        /* Animación suave al hacer clic en el índice */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>

    <div class="indice" id="inicio">
        <h2>📑 Índice de Contenidos</h2>
        <ul>`;

            let listaIndice = "";
            let contenidoSecciones = "";
            
            const parser = new DOMParser();

            for (let i = 0; i < input.files.length; i++) {
                const file = input.files[i];
                const text = await file.text();
                const nombreSinExtension = file.name.replace(/\.[^/.]+$/, "");
                const idSeccion = "seccion-" + i;

                const docOriginal = parser.parseFromString(text, 'text/html');
                const contenidoBody = docOriginal.body ? docOriginal.body.innerHTML : text;

                listaIndice += `<li><a href="#${idSeccion}">📄 ${nombreSinExtension}</a></li>\n`;

                contenidoSecciones += `
    <div id="${idSeccion}" class="seccion">
        <h2 class="titulo-seccion">${nombreSinExtension}</h2>
        <div class="contenido-original">
            ${contenidoBody}
        </div>
        <a href="#inicio" class="volver-arriba">⬆️ Volver al índice</a>
    </div>\n`;
            }

            htmlFinal += listaIndice + `        </ul>\n    </div>\n` + contenidoSecciones + `\n</body>\n</html>`;

            const blob = new Blob([htmlFinal], { type: 'text/html' });
            const urlDescarga = URL.createObjectURL(blob);
            
            const enlaceOculto = document.createElement('a');
            enlaceOculto.href = urlDescarga;
            enlaceOculto.download = 'minilibros.html';
            document.body.appendChild(enlaceOculto);
            enlaceOculto.click();
            document.body.removeChild(enlaceOculto);

            URL.revokeObjectURL(urlDescarga);

            statusDiv.style.color = "#27ae60";
            statusDiv.innerHTML = '✅ ¡Listo! Se ha descargado tu archivo. Ábrelo para ver los marcos.';
        }
    </script>
</body>
</html>
