<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Dron Pilot - Niveles de Dificultad</title>
    <style>
        :root {
            --primary: #2ecc71;
            --danger: #e74c3c;
            --dark: #1a1a1a;
            --panel: #2c3e50;
            --dron-front: #e74c3c;
            --base-color: #3498db;
        }
        body { background: var(--dark); color: white; margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; transition: background 1s ease; }

        /* --- PANEL LATERAL --- */
        .sidebar { width: 320px; background: var(--panel); padding: 15px; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.3); z-index: 10; overflow-y: auto; }
        #score-container { font-size: 1.2rem; font-weight: bold; text-align: center; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; margin-bottom: 10px; border-bottom: 3px solid var(--primary); }
        
        textarea { height: 160px; width: 100%; background: #111; color: #00ff00; border: 1px solid #444; border-radius: 6px; padding: 10px; font-family: 'Courier New', monospace; resize: none; outline: none; box-sizing: border-box; font-size: 0.9rem; }
        
        .button-group { display: flex; gap: 8px; margin: 10px 0; }
        .btn-run { flex: 2; background: var(--primary); border: none; padding: 10px; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }
        .btn-clear { flex: 1; background: var(--danger); border: none; padding: 10px; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }

        .guia-comandos { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; font-size: 0.75rem; line-height: 1.3; margin-top: 10px;}

        /* --- MUNDO 3D --- */
        .viewport { flex-grow: 1; position: relative; perspective: 1200px; display: flex; justify-content: center; align-items: center; }
        #mundo { width: 600px; height: 500px; position: relative; transform-style: preserve-3d; transform: rotateX(55deg) rotateZ(-20deg); }
        .suelo { position: absolute; width: 800px; height: 800px; background: rgba(238, 238, 238, 0.9); top: -150px; left: -100px; background-image: radial-gradient(#ccc 1px, transparent 1px); background-size: 40px 40px; border: 2px solid #ddd; }
        
        #meta { position: absolute; width: 80px; height: 80px; border: 5px solid var(--primary); border-radius: 50%; background: rgba(46, 204, 113, 0.2); box-shadow: 0 0 15px var(--primary); transition: all 0.5s ease; }
        #base-home { position: absolute; width: 50px; height: 50px; border: 2px solid var(--base-color); display: flex; align-items: center; justify-content: center; color: var(--base-color); font-weight: bold; font-size: 9px; }

        /* DRON */
        #dron-container { position: absolute; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        #dron-modelo { width: 40px; height: 40px; background: #3498db; border-radius: 8px; position: relative; transform-style: preserve-3d; }
        #dron-modelo::before { content: ""; position: absolute; top: 0; left: 10px; width: 20px; height: 8px; background: var(--dron-front); border-radius: 3px 3px 0 0; }
        .helice { position: absolute; width: 30px; height: 2px; background: #000; top: 50%; left: 50%; margin-left: -15px; animation: spin 0.1s infinite linear; display: none; }
        @keyframes spin { to { transform: rotateZ(360deg); } }

        /* MODALES E IDENTIFICACIÓN */
        #player-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 40px; border-radius: 15px; text-align: center; color: #333; }
        .modal-content input { padding: 12px; width: 250px; font-size: 16px; border: 2px solid #ddd; border-radius: 5px; margin-bottom: 20px; }
        
        #status-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2001; }
        #status-message { background: white; padding: 30px; border-radius: 10px; color: #155724; font-weight: bold; font-size: 20px; border: 4px solid var(--primary); }
        
        #btn-send { margin-top: 15px; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="player-modal">
        <div class="modal-content">
            <h2>Dron Pilot - Misión de Vuelo</h2>
            <p>Introduce tu nombre para iniciar los motores:</p>
            <input type="text" id="nombre-alumno" placeholder="Nombre del Alumno">
            <br>
            <button onclick="iniciarMisionPiloto()" style="background:var(--primary); color:white; padding:12px 30px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">DESPEGAR</button>
        </div>
    </div>

    <div id="status-overlay">
        <div id="status-message"></div>
    </div>

    <div class="sidebar">
        <div id="score-container">SCORE: <span id="val-puntos">0</span></div>
        <div id="piloto-info" style="text-align:center; font-size:0.8rem; color:#bdc3c7; margin-bottom:10px;">Piloto: ---</div>
        
        <textarea id="consola" placeholder="Ejemplo:&#10;despegar&#10;avanzar 150&#10;girar derecha&#10;aterrizar"></textarea>

        <div class="button-group">
            <button class="btn-run" onclick="procesarComandos()">EJECUTAR</button>
            <button class="btn-clear" onclick="document.getElementById('consola').value=''">BORRAR</button>
        </div>

        <div class="guia-comandos">
            <b>Comandos:</b><br>
            - despegar / aterrizar<br>
            - avanzar [px]<br>
            - girar derecha / izquierda
        </div>

        <button id="btn-send" onclick="enviarResultados()">ENVIAR A SHEETS</button>
    </div>

    <div class="viewport">
        <div id="mundo">
            <div class="suelo"></div>
            <div id="base-home" style="left: 45px; top: 45px;">HOME</div>
            <div id="meta" style="left: 250px; top: 250px;"></div>
            
            <div id="dron-container" style="left: 50px; top: 50px;">
                <div id="dron-modelo">
                    <div class="helice" style="top:0; left:0"></div>
                    <div class="helice" style="top:0; left:100%"></div>
                    <div class="helice" style="top:100%; left:0"></div>
                    <div class="helice" style="top:100%; left:100%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let posX = 50, posY = 50, posZ = 0, angulo = 0, puntos = 0;
        let lastBaseX = 50, lastBaseY = 50, metaX = 250, metaY = 250;
        let alumnoNombre = "";
        let resultadosEnviados = false;

        function iniciarMisionPiloto() {
            const nom = document.getElementById('nombre-alumno').value.trim();
            if(!nom) return alert("Escribe tu nombre.");
            alumnoNombre = nom;
            document.getElementById('piloto-info').innerText = "Piloto: " + nom;
            document.getElementById('player-modal').style.display = 'none';
        }

        async function procesarComandos() {
            const lineas = document.getElementById('consola').value.toLowerCase().split('\n');
            for(let cmd of lineas) {
                if(cmd.trim()) await ejecutar(cmd.trim());
            }
        }

        function ejecutar(cmd) {
            return new Promise(resolve => {
                const partes = cmd.split(" ");
                const accion = partes[0];
                const valor = parseInt(partes[1]) || 0;

                if(accion === "despegar") {
                    posZ = 80;
                    document.querySelectorAll('.helice').forEach(h => h.style.display = 'block');
                } else if(accion === "aterrizar") {
                    posZ = 0;
                    actualizarDron();
                    setTimeout(async () => {
                        const exito = verificarAterrizaje();
                        if(!exito) await volverABase();
                        resolve();
                    }, 800);
                    return;
                } else if(accion === "girar") {
                    if(partes[1] === "derecha") angulo += 90;
                    if(partes[1] === "izquierda") angulo -= 90;
                } else if(accion === "avanzar") {
                    const rad = (angulo - 90) * (Math.PI / 180); 
                    posX += Math.cos(rad) * valor;
                    posY += Math.sin(rad) * valor;
                }
                actualizarDron();
                setTimeout(resolve, 800); 
            });
        }

        function actualizarDron() {
            const c = document.getElementById('dron-container');
            c.style.left = posX + "px";
            c.style.top = posY + "px";
            c.style.transform = `translate3d(0, 0, ${posZ}px)`;
            document.getElementById('dron-modelo').style.transform = `rotateZ(${angulo}deg)`;
        }

        function verificarAterrizaje() {
            const dist = Math.sqrt(Math.pow(posX - metaX, 2) + Math.pow(posY - metaY, 2));
            if(dist < 55) {
                puntos++;
                document.getElementById('val-puntos').innerText = puntos;
                lastBaseX = posX; lastBaseY = posY;
                actualizarDificultad();
                moverMeta();
                document.querySelectorAll('.helice').forEach(h => h.style.display = 'none');
                return true;
            }
            return false;
        }

        // --- SISTEMA DE CLASIFICACIÓN POR COLORES ---
        function actualizarDificultad() {
            let bg = "#1a1a1a"; // Color por defecto (Negro/Oscuro)
            
            if (puntos >= 1 && puntos <= 5) bg = "#005a9e";   // Azul
            if (puntos >= 6 && puntos <= 10) bg = "#107c10";  // Verde
            if (puntos >= 11 && puntos <= 15) bg = "#d29200"; // Amarillo
            if (puntos >= 16 && puntos <= 20) bg = "#d35400"; // Naranja
            if (puntos >= 21) bg = "#a4262c";                 // Rojo (Experto)

            document.body.style.backgroundColor = bg;
        }

        async function volverABase() {
            posZ = 100; actualizarDron();
            await new Promise(r => setTimeout(r, 600));
            posX = lastBaseX; posY = lastBaseY; angulo = 0;
            actualizarDron();
            await new Promise(r => setTimeout(r, 800));
            posZ = 0; actualizarDron();
            document.querySelectorAll('.helice').forEach(h => h.style.display = 'none');
        }

        function moverMeta() {
            do {
                metaX = Math.floor(Math.random() * 400) + 50;
                metaY = Math.floor(Math.random() * 350) + 50;
            } while (Math.sqrt(Math.pow(metaX - lastBaseX, 2) + Math.pow(metaY - lastBaseY, 2)) < 120);
            const m = document.getElementById('meta');
            m.style.left = metaX + "px";
            m.style.top = metaY + "px";
        }

        function enviarResultados() {
            if (resultadosEnviados) return;
            const scriptUrl = "https://script.google.com/macros/s/AKfycbwVPttSZrhwfWwSZpFo7KWjJ39vldQm3MPGykMWEPWOoF4UsZ24mC8YhgiaE-0xm_7G/exec";
            
            resultadosEnviados = true;
            document.getElementById('btn-send').disabled = true;
            document.getElementById('status-overlay').style.display = 'flex';
            document.getElementById('status-message').innerText = "ENVIANDO DATOS AL PROFESOR...";

            fetch(scriptUrl, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ player1: "Dron " + alumnoNombre, score1: puntos, player2: "---", score2: 0, timestamp: new Date().toLocaleString() })
            }).then(() => {
                document.getElementById('status-message').innerText = "¡RESULTADOS REGISTRADOS!";
                setTimeout(() => { document.getElementById('status-overlay').style.display = 'none'; }, 3000);
            });
        }
    </script>
</body>
</html>
