<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador WEB2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary: #FF4757;
            --secondary: #2ED573;
            --accent: #1E90FF;
            --text-main: #2F3542;
            --text-muted: #747D8C;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 700px;
            text-align: center;
            border: 3px solid #FFF;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            background: -webkit-linear-gradient(#FF4757, #FFA502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 500;
        }

        .upload-area {
            border: 3px dashed var(--accent);
            border-radius: 15px;
            padding: 50px 20px;
            background-color: rgba(30, 144, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-area:hover {
            border-color: #FFA502;
            background-color: rgba(255, 165, 2, 0.05);
            transform: translateY(-2px);
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .folder-summary {
            margin-top: 25px;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            padding: 15px;
            background: #F1F2F6;
            border-radius: 10px;
            border-left: 5px solid var(--secondary);
            display: none;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            border: none;
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-download {
            background: linear-gradient(90deg, #1E90FF, #3742FA);
            color: white;
            flex: 2;
            box-shadow: 0 4px 15px rgba(30, 144, 255, 0.4);
        }

        .btn-clear {
            background: #FF4757;
            color: white;
            flex: 1;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            display: none;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .btn-download:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(30, 144, 255, 0.6);
        }

        .btn-clear:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
        }

        .btn:disabled {
            background: #CED6E0;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 10px;
        }
        .badge.html { background-color: var(--primary); }
        .badge.pdf { background-color: var(--secondary); }

    </style>
</head>
<body>

    <div class="container">
        <h1>WEB2026</h1>
        <p class="subtitle">Añade tus carpetas. Se generará un índice interactivo a todo color.</p>

        <div class="upload-area">
            <div class="upload-icon">🗂️</div>
            <strong style="font-size: 1.2rem; color: var(--accent);">Haz clic aquí para añadir una carpeta</strong>
            <p style="margin-top: 10px; font-size: 0.9rem; color: var(--text-muted);">Puedes repetir este paso para añadir múltiples carpetas.</p>
            <input type="file" id="fileInput" webkitdirectory directory multiple>
        </div>

        <div class="folder-summary" id="folderSummary"></div>

        <div class="button-group">
            <button class="btn btn-clear" id="clearBtn">Limpiar Todo</button>
            <button class="btn btn-download" id="downloadBtn" disabled>Generar y Descargar WEB2026.zip</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const folderSummary = document.getElementById('folderSummary');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        
        let groupedByFolder = {};
        let addedFilePaths = new Set();
        let hasFiles = false;

        // Acumular archivos
        fileInput.addEventListener('change', (event) => {
            const newFiles = Array.from(event.target.files).filter(file => {
                const name = file.name.toLowerCase();
                return name.endsWith('.html') || name.endsWith('.pdf');
            });

            newFiles.forEach(file => {
                if (!addedFilePaths.has(file.webkitRelativePath)) {
                    addedFilePaths.add(file.webkitRelativePath);
                    hasFiles = true;

                    const pathParts = file.webkitRelativePath.split('/');
                    const mainFolder = pathParts[0] || "Raíz";

                    if (!groupedByFolder[mainFolder]) {
                        groupedByFolder[mainFolder] = { html: [], pdf: [], rawFiles: [] };
                    }

                    groupedByFolder[mainFolder].rawFiles.push(file);

                    if (file.name.toLowerCase().endsWith('.html')) {
                        groupedByFolder[mainFolder].html.push(file);
                    } else if (file.name.toLowerCase().endsWith('.pdf')) {
                        groupedByFolder[mainFolder].pdf.push(file);
                    }
                }
            });

            fileInput.value = ''; 
            updateUI();
        });

        // Limpiar todo
        clearBtn.addEventListener('click', () => {
            groupedByFolder = {};
            addedFilePaths.clear();
            hasFiles = false;
            updateUI();
        });

        // Actualizar UI
        function updateUI() {
            folderSummary.innerHTML = '';
            const folderNames = Object.keys(groupedByFolder);
            
            if (hasFiles && folderNames.length > 0) {
                folderSummary.style.display = 'block';
                clearBtn.style.display = 'block';
                downloadBtn.disabled = false;
                
                let summaryHTML = `<h3 style="margin-top:0; color:#2F3542;">Carpetas añadidas:</h3>`;
                
                folderNames.forEach(folder => {
                    const htmlCount = groupedByFolder[folder].html.length;
                    const pdfCount = groupedByFolder[folder].pdf.length;
                    
                    summaryHTML += `
                        <div style="margin-bottom: 10px;">
                            <strong>📁 ${folder}</strong>
                            <span class="badge html">${htmlCount} HTML</span>
                            <span class="badge pdf">${pdfCount} Teorías</span>
                        </div>
                    `;
                });
                folderSummary.innerHTML = summaryHTML;
            } else {
                folderSummary.style.display = 'none';
                clearBtn.style.display = 'none';
                downloadBtn.disabled = true;
            }
        }

        // Generar ZIP con índice Desplegable Colorido
        downloadBtn.addEventListener('click', async () => {
            if (!hasFiles) return;

            downloadBtn.textContent = "Empaquetando WEB2026...";
            downloadBtn.disabled = true;
            clearBtn.disabled = true;

            const zip = new JSZip();
            let indexBodyContent = '';

            // Paleta de colores vibrantes para cada carpeta
            const themeColors = ['#6c5ce7', '#00b894', '#0984e3', '#e84393', '#fdcb6e', '#00cec9', '#d63031'];

            Object.keys(groupedByFolder).forEach((folderName, index) => {
                const folderData = groupedByFolder[folderName];
                const themeColor = themeColors[index % themeColors.length]; // Alterna los colores
                
                // Añadir al ZIP
                folderData.rawFiles.forEach(file => {
                    zip.file(file.webkitRelativePath, file);
                });

                // Crear sección desplegable (details/summary) inyectando el color dinámico
                indexBodyContent += `
                    <details class="folder-section" style="border-left-color: ${themeColor};">
                        <summary class="folder-title">
                            <div style="display: flex; align-items: center;">
                                <span class="folder-icon" style="background: ${themeColor};">📁</span>
                                <span style="color: ${themeColor};">${folderName}</span>
                            </div>
                            <span class="arrow" style="color: ${themeColor};">▼</span>
                        </summary>
                        
                        <div class="folder-content">
                            <div class="sub-section">
                                <h3 class="html-title">🌐 HTML</h3>
                                <ul class="html-list">
                                    ${folderData.html.length > 0 ? 
                                        folderData.html.map(f => `<li><a href="${f.webkitRelativePath}" target="_blank">${f.name}</a></li>`).join('') 
                                        : '<li class="empty-msg">No hay archivos HTML en esta carpeta.</li>'}
                                </ul>
                            </div>

                            <div class="sub-section">
                                <h3 class="pdf-title">📚 Teorías</h3>
                                <ul class="pdf-list">
                                    ${folderData.pdf.length > 0 ? 
                                        folderData.pdf.map(f => `<li><a href="${f.webkitRelativePath}" target="_blank">${f.name}</a></li>`).join('') 
                                        : '<li class="empty-msg">No hay Teorías (PDF) en esta carpeta.</li>'}
                                </ul>
                            </div>
                        </div>
                    </details>
                `;
            });

            // Código de la plantilla interna súper colorida
            const indexHTMLContent = `
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice WEB2026</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4ebf5 100%);
            --card: #ffffff;
            --text: #2d3436;
            --html-border: #ff7675;
            --html-bg: #fff5f5;
            --pdf-border: #74b9ff;
            --pdf-bg: #f0f8ff;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
        }
        .header { 
            text-align: center; 
            margin-bottom: 50px; 
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: inline-block;
            width: 100%;
            max-width: 840px;
            box-sizing: border-box;
        }
        .header-wrapper {
            display: flex;
            justify-content: center;
        }
        .header h1 {
            font-size: 3rem; margin: 0 0 10px 0;
            background: linear-gradient(to right, #ff4757, #ffa502, #2ed573, #1e90ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .header p {
            color: #636e72;
            font-size: 1.1rem;
            margin: 0;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Estilos del Desplegable */
        details.folder-section {
            background: var(--card); 
            border-radius: 16px; 
            margin-bottom: 25px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.04);
            border-left: 8px solid; /* El color se inyecta por JS */
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        summary.folder-title {
            padding: 20px 30px;
            font-size: 1.5rem; 
            font-weight: 700;
            cursor: pointer;
            list-style: none; /* Oculta la flecha por defecto */
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            transition: background-color 0.2s;
        }
        
        summary.folder-title:hover {
            background-color: #f8f9fa;
        }

        .folder-icon {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            color: white;
            margin-right: 15px;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Flecha animada */
        summary::-webkit-details-marker { display: none; }
        .arrow {
            font-size: 1.2rem;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        details[open] .arrow {
            transform: rotate(-180deg);
        }

        /* Contenido que se despliega */
        .folder-content {
            padding: 10px 30px 30px 30px;
            border-top: 2px solid #f1f2f6;
            animation: slideDown 0.4s ease-out;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sub-section { margin-top: 25px; }
        .html-title { color: #d63031; display: flex; align-items: center; margin-bottom: 15px; font-size: 1.3rem; }
        .pdf-title { color: #0984e3; display: flex; align-items: center; margin-bottom: 15px; font-size: 1.3rem; }
        ul { list-style-type: none; padding: 0; margin: 0; display: grid; gap: 12px; }
        
        /* Estilo de los enlaces (tarjetitas) */
        li {
            border-radius: 10px; 
            transition: all 0.2s ease;
        }
        
        .html-list li {
            background: var(--html-bg);
            border: 1px solid rgba(255, 118, 117, 0.3);
            border-left: 5px solid var(--html-border);
        }
        
        .pdf-list li {
            background: var(--pdf-bg);
            border: 1px solid rgba(116, 185, 255, 0.3);
            border-left: 5px solid var(--pdf-border);
        }

        li:hover { 
            transform: translateX(8px) scale(1.01); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        a { 
            text-decoration: none; 
            color: var(--text); 
            font-weight: 600; 
            display: block; 
            padding: 14px 20px;
            word-break: break-all; 
        }
        
        .html-list a:hover { color: #d63031; }
        .pdf-list a:hover { color: #0984e3; }
        
        li.empty-msg { 
            background: transparent !important; 
            border: 2px dashed #dfe6e9 !important;
            color: #b2bec3; 
            font-style: italic; 
            padding: 14px 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header-wrapper">
        <div class="header">
            <h1>🚀 Proyecto WEB2026</h1>
            <p><strong>Haz clic en una carpeta para explorar su contenido.</strong></p>
        </div>
    </div>
    <div class="container">
        ${indexBodyContent}
    </div>
</body>
</html>`;

            zip.file("index.html", indexHTMLContent);

            zip.generateAsync({ type: "blob" }).then(function(content) {
                const url = window.URL.createObjectURL(content);
                const a = document.createElement("a");
                a.style.display = "none";
                a.href = url;
                a.download = "WEB2026.zip"; 
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                downloadBtn.textContent = "Generar y Descargar WEB2026.zip";
                downloadBtn.disabled = false;
                clearBtn.disabled = false;
            }).catch(function(err) {
                console.error("Error al generar el ZIP: ", err);
                alert("Hubo un error al empaquetar WEB2026.");
                downloadBtn.textContent = "Generar y Descargar WEB2026.zip";
                downloadBtn.disabled = false;
                clearBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
