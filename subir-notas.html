<!DOCTYPE html>
<!-- saved from url=(0045)https://delatj.github.io/web/subir-notas.html -->
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Web de Notas Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #eef2f5; 
            color: #333; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .app-container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            max-width: 550px; 
            text-align: center; 
            width: 100%; 
        }
        h1 { color: #0056b3; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; font-size: 15px; }
        .drop-zone { border: 3px dashed #007BFF; padding: 40px 20px; border-radius: 10px; background: #f8faff; cursor: pointer; transition: 0.3s; margin-bottom: 15px; display: block; }
        .drop-zone:hover { background: #e2edff; border-color: #0056b3; }
        .drop-zone span { font-size: 50px; display: block; margin-bottom: 10px; }
        input[type="file"] { display: none; }
        #file-status { color: #28a745; font-weight: bold; font-size: 16px; min-height: 45px; margin-bottom: 10px;}
        .btn-notas { background-color: #28a745; color: white; border: none; padding: 15px 25px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.3s; display: none; }
        .btn-notas:hover { background-color: #218838; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Creador de Web de Notas Pro</h1>
        <p>Sube tus CSV. (los títulos de las columnas de notas que empiezan por p= proyectos, los c = pruebas y lo t = tareas), PARA LAS PRENOTAS PULSA LA PALABRA NOTAS EN EL HTML NOTAS_ALUMNOS.</p>
        
        <label class="drop-zone" for="csvFiles" id="dropArea">
            <span>📁</span>
            Haz clic aquí para seleccionar los archivos CSV <br>o <b>arrástralos y suéltalos</b>.
        </label>
        
        <input type="file" id="csvFiles" multiple="" accept=".csv">
        <div id="file-status"></div>
        <button id="btnGenerar" class="btn-notas" onclick="generarYDescargar()">✅ Generar Archivo Final</button>
    </div>

    <script>
        const fileInput = document.getElementById('csvFiles');
        const fileStatus = document.getElementById('file-status');
        const btnGenerar = document.getElementById('btnGenerar');
        const dropArea = document.getElementById('dropArea');

        dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.style.backgroundColor = '#d0e3ff'; });
        dropArea.addEventListener('dragleave', () => { dropArea.style.backgroundColor = '#f8faff'; });
        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.style.backgroundColor = '#f8faff';
            fileInput.files = e.dataTransfer.files; 
            actualizarEstado();
        });

        fileInput.addEventListener('change', actualizarEstado);

        function actualizarEstado() {
            if (fileInput.files.length > 0) {
                fileStatus.innerHTML = "✅ ¡Listo! <b>" + fileInput.files.length + " archivo(s)</b> cargados.";
                btnGenerar.style.display = "block"; 
            } else {
                fileStatus.innerHTML = "";
                btnGenerar.style.display = "none";
            }
        }

        async function generarYDescargar() {
            if (fileInput.files.length === 0) return;

            const files = Array.from(fileInput.files);
            let tabsHTML = "";
            let tablesHTML = "";

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const text = await file.text();
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                const tabName = file.name.replace('.csv', '').toUpperCase();
                const activeClass = i === 0 ? "active" : "";
                
                tabsHTML += '<div class="tab ' + activeClass + '" id="tab-btn-' + i + '" onclick="cambiarPestana(' + i + ')">' + tabName + '</div>\n';
                tablesHTML += '<div class="tab-content ' + activeClass + '" id="tab-content-' + i + '">\n<table>\n';

                const firstLineCols = lines[0].split(';');
                let columnHeaders = [];
                let columnColors = [];
                let typeCols = { T: [], C: [], P: [] };

                if (firstLineCols.length > 1) {
                    const anonymousColumns = firstLineCols.slice(1);
                    
                    anonymousColumns.forEach((col, colIndex) => {
                        let valorCelda = col.trim();
                        if (colIndex === 0) {
                            columnHeaders.push("CÓDIGO");
                            columnColors.push("#ffffff");
                        } else {
                            columnHeaders.push(valorCelda);
                            let inicial = valorCelda.charAt(0).toUpperCase();
                            let colorFondo = "#ffe5b4"; 
                            if (inicial === 'T') { colorFondo = "#cce5ff"; typeCols.T.push(colIndex); }
                            else if (inicial === 'M') { colorFondo = "#e2d9f3"; }
                            else if (inicial === 'C') { colorFondo = "#f8d7da"; typeCols.C.push(colIndex); }
                            else if (inicial === 'P') { colorFondo = "#d4edda"; typeCols.P.push(colIndex); }
                            columnColors.push(colorFondo);
                        }
                    });
                }

                function calcAvg(cols, indices) {
                    if (indices.length === 0) return null;
                    let sum = 0; 
                    indices.forEach(idx => {
                        let val = cols[idx];
                        if(val && val.trim() !== "") {
                            let num = parseFloat(val.replace(',', '.')); 
                            if (!isNaN(num)) { sum += num; }
                        }
                    });
                    return sum / indices.length; 
                }

                let parsedStudents = [];
                let maxAvgs = { T: 0, C: 0, P: 0 };

                for (let r = 1; r < lines.length; r++) {
                    const columns = lines[r].split(';');
                    if (columns.length > 1) {
                        const rawName = columns[0].trim(); 
                        const anonymousColumns = columns.slice(1); 
                        
                        let avgT = calcAvg(anonymousColumns, typeCols.T);
                        let avgC = calcAvg(anonymousColumns, typeCols.C);
                        let avgP = calcAvg(anonymousColumns, typeCols.P);
                        
                        if (avgT !== null && avgT > maxAvgs.T) maxAvgs.T = avgT;
                        if (avgC !== null && avgC > maxAvgs.C) maxAvgs.C = avgC;
                        if (avgP !== null && avgP > maxAvgs.P) maxAvgs.P = avgP;
                        
                        parsedStudents.push({ 
                            cols: anonymousColumns, 
                            avgT: avgT, avgC: avgC, avgP: avgP, 
                            realName: rawName 
                        });
                    }
                }

                parsedStudents.forEach((stu, sIndex) => {
                    let encodedName = btoa(unescape(encodeURIComponent(stu.realName)));
                    let encodedSearch = btoa(unescape(encodeURIComponent(stu.realName.toLowerCase())));

                    tablesHTML += '<tr class="student-card" data-name="' + encodedName + '" data-search="' + encodedSearch + '">\n';
                    
                    tablesHTML += '<td data-label="Identificación" style="background-color: #eee;" class="col-identificacion"><span class="grade-val">' + stu.cols[0] + '</span></td>\n';

                    if (typeCols.T.length > 0 && stu.avgT !== null) {
                        let pctT = maxAvgs.T > 0 ? ((stu.avgT / maxAvgs.T) * 10 ).toFixed(1) : 0;
                        tablesHTML += '<td data-label="MEDIA TAREAS" style="background-color: #b8d4ff; border: 3px solid #0056b3 !important;"><span class="grade-val">' + pctT + '</span></td>\n';
                    }
                    if (typeCols.C.length > 0 && stu.avgC !== null) {
                        let pctC = maxAvgs.C > 0 ? ((stu.avgC / maxAvgs.C) * 10 ).toFixed(1) : 0;
                        tablesHTML += '<td data-label="MEDIA PRUEBAS" style="background-color: #f5c6cb; border: 3px solid #b21f2d !important;"><span class="grade-val">' + pctC + '</span></td>\n';
                    }
                    if (typeCols.P.length > 0 && stu.avgP !== null) {
                        let pctP = maxAvgs.P > 0 ? ((stu.avgP / maxAvgs.P) * 10 ).toFixed(1) : 0;
                        tablesHTML += '<td data-label="MEDIA PROYECTOS" style="background-color: #c3e6cb; border: 3px solid #1e7e34 !important;"><span class="grade-val">' + pctP + '</span></td>\n';
                    }

                    stu.cols.slice(1).forEach((col, cIdx) => {
                        let realIdx = cIdx + 1;
                        tablesHTML += '<td data-label="' + columnHeaders[realIdx] + '" style="background-color: ' + columnColors[realIdx] + ';"><span class="grade-val">' + col + '</span></td>\n';
                    });
                    tablesHTML += '</tr>\n';
                });
                tablesHTML += '</tbody>\n</table>\n</div>\n';
            }

            const finalHTML = `<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Notas</title>
<style>

  @media (max-width: 480px) {

<body>

  <div id="vista-notas">
      <div class="container">
        <h2>Consulta de <span class="secret-trigger" onclick="abrirPrenotas()" title="Acceso a profesor">Notas</span></h2>
        <div class="disclaimer">💡 <b>Aviso:</b> Las notas mostradas son informativas. No todas las notas valen lo mismo, dependen del criterio al que estén asociadas. Las tareas no entregadas cuentan como 0.</div>
        
        <div class="tabs">${tabsHTML}</div>
        
        <input type="text" id="searchInput" class="search-box" placeholder="Introduce tu CÓDIGO..." onkeyup="filtrarNotas()">
        
        <div class="nav-tools" id="navTools">
            <button id="btnPrev" class="btn-nav" onclick="moverAlumno(-1)">⬅ Anterior</button>
            <button id="btnNext" class="btn-nav" onclick="moverAlumno(1)">Siguiente ➔</button>
        </div>

        <div id="tablesContainer">${tablesHTML}</div>
        
        <p class="aviso" id="avisoNoEncontrado">No encontrado.</p>
      </div>
  </div>

  <div id="vista-prenotas" class="hidden">
      <div class="prenotas-container">
          <button class="btn-volver" onclick="volverNotas()">❌ Volver</button>
          <h1>📝 Control de Prenotas Tecnología</h1>

          <div id="main-prenotas">
              <div class="current-info">
                  <div style="display:flex; justify-content:space-between; width:100%;">
                      <span style="font-size: 1.1em;">Alumno/a: <strong id="currentStudentName"></strong></span>
                      <span id="counter" style="font-weight: bold; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 4px;"></span>
                  </div>
                  <div id="currentMedias" style="color: #ffd54f; font-weight: bold; font-size: 0.9em; margin-top: 5px;"></div>
              </div>

              <div class="items-container">
                  <div class="item-group buenos">
                      <strong>✅ Aspectos Positivos</strong>
                      <label><input type="checkbox" class="item" value="está trabajando bien"> está trabajando bien...</label>
                      <label><input type="checkbox" class="item" value="tiene buena actitud"> tiene buena actitud.</label>
                      <label><input type="checkbox" class="item" value="se esfuerza pero le cuesta y debe seguir así sin bajar su ritmo"> se esfuerza pero le cuesta...</label>
                  </div>
                  <div class="item-group malos">
                      <strong>❌ Aspectos a Mejorar</strong>
                      <label><input type="checkbox" class="item" value="debe trabajar y esforzarse más si quiere aprobar"> debe trabajar más...</label>
                      <label><input type="checkbox" class="item" value="tiene mala actitud en clase"> tiene mala actitud.</label>
                      <label><input type="checkbox" class="item" value="es absentista"> es absentista.</label>
                      <label><input type="checkbox" class="item" value="está faltando mucho este trimestre y esto le repercute negativamente en la nota"> está faltando mucho...</label>
                      <label><input type="checkbox" class="item" value="hay días que no ha entregado las tareas o las ha entregado mal"> tareas: no entregadas/mal.</label>
                  </div>

              <textarea id="part1" rows="3"></textarea>

              <span class="section-label">Parte 2 (Refuerzo):</span>
              <textarea id="part2" rows="3"></textarea>

              <div class="controls">
                  <button class="btn-nav-prenotas" onclick="prevStudent()">⬅️ Anterior</button>
                  <button class="btn-nav-prenotas" onclick="nextStudent()">Siguiente ➡️</button>
                  <button class="btn-copy" onclick="copyCurrent()">📋 COPIAR NOTA ACTUAL</button>
              </div>

              <div class="result-area">
                  <div id="finalText"></div>
              </div>
              
              <button class="btn-download" onclick="downloadAllHtml()">📥 Descargar HTML Web (Todos los Alumnos)</button>
              <button class="btn-print" onclick="imprimirTodos()">🖨️ Imprimir / Guardar en PDF (Páginas Individuales)</button>
          </div>

  <script>
    let currentStudentIndex = -1;
    let unlocked = false;
    let studentsData = []; 
    let currentIndex = 0;
    let dataStore = {};

    const defPart1 = "Buenos días, en cuanto a las notas de la materia puede ir viendo la evolución de su hijo/a (con el código proporcionado en clase) en la siguiente dirección web  https://delatj.github.io/web/Notas_Alumnos.html";
    const defPart2 = "Además tiene la posibilidad de hacer tareas para subir nota que pueden encontrar en la plataforma de trabajo online Classroom o Moodle.";

    function cambiarPestana(index) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-btn-' + index).classList.add('active');
      document.getElementById('tab-content-' + index).classList.add('active');
      document.getElementById("searchInput").value = ""; 
      resetBusqueda();
    }

    function resetBusqueda() {
        document.querySelectorAll('.student-card').forEach(tr => tr.style.display = "none");
        currentStudentIndex = -1;
        document.getElementById('navTools').style.display = "none";
        document.getElementById('avisoNoEncontrado').style.display = "none";
    }

    // BÚSQUEDA DEL ALUMNO POR CÓDIGO
    function filtrarNotas() {
      const input = document.getElementById("searchInput").value.trim().toLowerCase();
      const navTools = document.getElementById('navTools');
      if (input === "") { resetBusqueda(); return; }
      
      let encontrado = false;
      const activeContent = document.querySelector('.tab-content.active');
      if (!activeContent) return;
      
      const trs = activeContent.querySelectorAll(".student-card");
      trs.forEach(tr => {
          let valorCodigo = tr.querySelector('.col-identificacion .grade-val').innerText.trim().toLowerCase();
          
          if (valorCodigo === input) {
              tr.style.display = "flex";
              encontrado = true;
              currentStudentIndex = Array.from(trs).indexOf(tr);
              navTools.style.display = "flex"; 
          } else {
              tr.style.display = "none";
          }
      });
      document.getElementById('avisoNoEncontrado').style.display = encontrado ? "none" : "block";
    }

    function comprobarPassword() {
        if (!unlocked) {
            let pass = prompt("Introduce la contraseña para navegar:");
            if (pass === "1979") { unlocked = true; return true; } 
            else { alert("Contraseña incorrecta."); return false; }
        }
        return true;
    }

    function moverAlumno(direccion) {
      if (!comprobarPassword()) return;
      const activeContent = document.querySelector('.tab-content.active');
      const allCards = Array.from(activeContent.querySelectorAll('.student-card'));
      
      if (allCards.length === 0) return;
      
      allCards.forEach(c => c.style.display = "none");
      currentStudentIndex += direccion;
      
      if (currentStudentIndex >= allCards.length) currentStudentIndex = 0;
      if (currentStudentIndex < 0) currentStudentIndex = allCards.length - 1;
      
      const nextCard = allCards[currentStudentIndex];
      nextCard.style.display = "flex";
      
      document.getElementById("searchInput").value = nextCard.querySelector('.col-identificacion .grade-val').innerText;
    }

    function abrirPrenotas() {
        if (!unlocked) {
            let pass = prompt("Acceso restringido. Introduce la contraseña del profesor:");
            if (pass === "1979") {
                unlocked = true;
            } else {
                if (pass !== null) alert("Contraseña incorrecta.");
                return;
            }
        }
        
        document.getElementById('vista-notas').classList.add('hidden');
        document.getElementById('vista-prenotas').classList.remove('hidden');

        studentsData = [];
        const activeTab = document.querySelector('.tab-content.active');
        if(activeTab) {
            const rows = activeTab.querySelectorAll('.student-card');
            rows.forEach(row => {
                // Recupera el nombre real (Columna 0 oculta en CSV original)
                let realName = decodeURIComponent(escape(atob(row.getAttribute('data-name')))).toUpperCase();
                
                let medias = [];
                row.querySelectorAll('td').forEach(td => {
                    let label = td.getAttribute('data-label');
                    if (label && label.includes('MEDIA')) {
                        let val = td.querySelector('.grade-val').innerText;
                        medias.push(label + ': ' + val);
                    }
                });

                if(realName) {
                    studentsData.push({ 
                        name: realName, 
                        medias: medias.join(' | ') 
                    });
                }
            });
        }
        
        if(studentsData.length === 0) {
            alert("No se han encontrado alumnos en la pestaña actual.");
            volverNotas();
            return;
        }

        showStudent(0);
    }

    function volverNotas() {
        document.getElementById('vista-prenotas').classList.add('hidden');
        document.getElementById('vista-notas').classList.remove('hidden');
    }

    function showStudent(index) {
        currentIndex = index;
        const stu = studentsData[currentIndex];
        
        document.getElementById('currentStudentName').innerText = stu.name;
        document.getElementById('currentMedias').innerText = stu.medias;
        document.getElementById('counter').innerText = (currentIndex + 1) + " de " + studentsData.length;
        
        const saved = dataStore[stu.name] || { items: [], p1: defPart1, p2: defPart2 };
        document.querySelectorAll('.item').forEach(cb => cb.checked = saved.items.includes(cb.value));
        document.getElementById('part1').value = saved.p1;
        document.getElementById('part2').value = saved.p2;
        
        updatePreview();
    }

    function formatItems(items) {
        if (items.length === 0) return "";
        if (items.length === 1) return items[0] + ".";
        const lastItem = items.pop();
        return items.join(', ') + ' y ' + lastItem + '.';
    }

    function updatePreview() {
        const stu = studentsData[currentIndex];
        const selectedItems = Array.from(document.querySelectorAll('.item:checked')).map(cb => cb.value);
        const p1 = document.getElementById('part1').value;
        const p2 = document.getElementById('part2').value;
        
        let descripcion = formatItems(selectedItems);
        dataStore[stu.name] = { items: selectedItems, p1: p1, p2: p2 };
        
        let cabecera = stu.name;
        if (stu.medias !== "") {
             cabecera += " - " + stu.medias;
        }
        
        document.getElementById('finalText').innerText = cabecera + "\\n\\n" + p1 + "\\n\\n" + p2 + "\\n\\nDescripción del alumnado: " + descripcion;
    }

    document.querySelectorAll('.item, #vista-prenotas textarea').forEach(el => el.addEventListener('input', updatePreview));

    function nextStudent() { if (currentIndex < studentsData.length - 1) showStudent(currentIndex + 1); }
    function prevStudent() { if (currentIndex > 0) showStudent(currentIndex - 1); }

    function copyCurrent() {
        navigator.clipboard.writeText(document.getElementById('finalText').innerText);
