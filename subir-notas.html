<!DOCTYPE html>
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Web de Notas Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f5; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 550px; text-align: center; width: 100%; }
        h1 { color: #0056b3; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; font-size: 15px; }
        .drop-zone { border: 3px dashed #007BFF; padding: 40px 20px; border-radius: 10px; background: #f8faff; cursor: pointer; transition: 0.3s; margin-bottom: 15px; display: block; }
        .drop-zone:hover { background: #e2edff; border-color: #0056b3; }
        .drop-zone span { font-size: 50px; display: block; margin-bottom: 10px; }
        input[type="file"] { display: none; }
        #file-status { color: #28a745; font-weight: bold; font-size: 16px; min-height: 45px; margin-bottom: 10px;}
        button { background-color: #28a745; color: white; border: none; padding: 15px 25px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.3s; display: none; }
        button:hover { background-color: #218838; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Generador de Web de Notas</h1>
    <p>Carga los CSV para crear la herramienta de consulta optimizada para móviles.</p>
    
    <label class="drop-zone" for="csvFiles" id="dropArea">
        <span>📁</span>
        Haz clic aquí para seleccionar los archivos <br>o <b>arrástralos y suéltalos</b>.
    </label>
    
    <input type="file" id="csvFiles" multiple="" accept=".csv">
    <div id="file-status"></div>
    <button id="btnGenerar" onclick="generarYDescargar()">✅ ¡Generar Web de Notas!</button>
</div>

<script>
    const fileInput = document.getElementById('csvFiles');
    const fileStatus = document.getElementById('file-status');
    const btnGenerar = document.getElementById('btnGenerar');
    const dropArea = document.getElementById('dropArea');

    dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.style.backgroundColor = '#d0e3ff'; });
    dropArea.addEventListener('dragleave', () => { dropArea.style.backgroundColor = '#f8faff'; });
    dropArea.addEventListener('drop', (e) => {
        e.preventDefault();
        dropArea.style.backgroundColor = '#f8faff';
        fileInput.files = e.dataTransfer.files; 
        actualizarEstado();
    });

    fileInput.addEventListener('change', actualizarEstado);

    function actualizarEstado() {
        if (fileInput.files.length > 0) {
            fileStatus.innerHTML = "✅ ¡Listo! <b>" + fileInput.files.length + " archivo(s)</b> cargados.";
            btnGenerar.style.display = "block"; 
        } else {
            fileStatus.innerHTML = "";
            btnGenerar.style.display = "none";
        }
    }

    async function generarYDescargar() {
        if (fileInput.files.length === 0) return;

        const files = Array.from(fileInput.files);
        let tabsHTML = "";
        let tablesHTML = "";

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const text = await file.text();
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
            const tabName = file.name.replace('.csv', '').toUpperCase();
            const activeClass = i === 0 ? "active" : "";
            
            tabsHTML += `<div class="tab ${activeClass}" id="tab-btn-${i}" onclick="cambiarPestana(${i})">${tabName}</div>\n`;
            tablesHTML += `<div class="tab-content ${activeClass}" id="tab-content-${i}">\n<table>\n`;

            let columnColors = [];
            let columnHeaders = [];
            let typeCols = { T: [], C: [], P: [] };

            const firstLineCols = lines[0].split(';');
            if (firstLineCols.length > 1) {
                const anonymousColumns = firstLineCols.slice(1);
                anonymousColumns.forEach((col, colIndex) => {
                    let valorCelda = col.trim();
                    if (colIndex === 0) {
                        columnHeaders.push("CÓDIGO");
                        columnColors.push("#ffffff");
                    } else {
                        columnHeaders.push(valorCelda);
                        let inicial = valorCelda.charAt(0).toUpperCase();
                        let colorFondo = "#ffe5b4"; 
                        if (inicial === 'T') { colorFondo = "#cce5ff"; typeCols.T.push(colIndex); }
                        else if (inicial === 'M') { colorFondo = "#e2d9f3"; }
                        else if (inicial === 'C') { colorFondo = "#f8d7da"; typeCols.C.push(colIndex); }
                        else if (inicial === 'P') { colorFondo = "#d4edda"; typeCols.P.push(colIndex); }
                        columnColors.push(colorFondo);
                    }
                });
            }

            function calcAvg(cols, indices) {
                if (indices.length === 0) return null;
                let sum = 0; 
                indices.forEach(idx => {
                    let val = cols[idx];
                    if(val && val.trim() !== "") {
                        let num = parseFloat(val.replace(',', '.')); 
                        if (!isNaN(num)) { sum += num; }
                    }
                });
                return sum / indices.length; 
            }

            let parsedStudents = [];
            let maxAvgs = { T: 0, C: 0, P: 0 };

            for (let r = 1; r < lines.length; r++) {
                const columns = lines[r].split(';');
                if (columns.length > 1) {
                    const anonymousColumns = columns.slice(1);
                    let avgT = calcAvg(anonymousColumns, typeCols.T);
                    let avgC = calcAvg(anonymousColumns, typeCols.C);
                    let avgP = calcAvg(anonymousColumns, typeCols.P);
                    if (avgT !== null && avgT > maxAvgs.T) maxAvgs.T = avgT;
                    if (avgC !== null && avgC > maxAvgs.C) maxAvgs.C = avgC;
                    if (avgP !== null && avgP > maxAvgs.P) maxAvgs.P = avgP;
                    parsedStudents.push({ cols: anonymousColumns, avgT: avgT, avgC: avgC, avgP: avgP });
                }
            }

            parsedStudents.forEach((stu, sIndex) => {
                tablesHTML += `<tr class="student-card" data-index="${sIndex}">`;
                tablesHTML += `<td data-label="Identificación" style="background-color: #eee;"><span class="grade-val">${stu.cols[0]}</span></td>`;

                if (typeCols.T.length > 0 && stu.avgT !== null) {
                    let pctT = maxAvgs.T > 0 ? ((stu.avgT / maxAvgs.T) * 100).toFixed(1) : 0;
                    tablesHTML += `<td data-label="📊 MEDIA TAREAS (Tú / Máx)" style="background-color: #b8d4ff; border: 3px solid #0056b3 !important;"><span class="grade-val">${stu.avgT.toFixed(2)} / ${maxAvgs.T.toFixed(2)} (${pctT}%)</span></td>`;
                }
                if (typeCols.C.length > 0 && stu.avgC !== null) {
                    let pctC = maxAvgs.C > 0 ? ((stu.avgC / maxAvgs.C) * 100).toFixed(1) : 0;
                    tablesHTML += `<td data-label="📊 MEDIA PRUEBAS (Tú / Máx)" style="background-color: #f5c6cb; border: 3px solid #b21f2d !important;"><span class="grade-val">${stu.avgC.toFixed(2)} / ${maxAvgs.C.toFixed(2)} (${pctC}%)</span></td>`;
                }
                if (typeCols.P.length > 0 && stu.avgP !== null) {
                    let pctP = maxAvgs.P > 0 ? ((stu.avgP / maxAvgs.P) * 100).toFixed(1) : 0;
                    tablesHTML += `<td data-label="📊 MEDIA PROYECTOS (Tú / Máx)" style="background-color: #c3e6cb; border: 3px solid #1e7e34 !important;"><span class="grade-val">${stu.avgP.toFixed(2)} / ${maxAvgs.P.toFixed(2)} (${pctP}%)</span></td>`;
                }

                stu.cols.slice(1).forEach((col, cIdx) => {
                    let realIdx = cIdx + 1;
                    tablesHTML += `<td data-label="${columnHeaders[realIdx]}" style="background-color: ${columnColors[realIdx]};"><span class="grade-val">${col}</span></td>`;
                });
                tablesHTML += "</tr>\n";
            });
            tablesHTML += `</tbody>\n</table>\n</div>\n`;
        }

        const finalHTML = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Notas</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f6; margin: 0; }
  .container { background-color: white; padding: 30px 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; max-width: 800px; margin: 0 auto; }
  .disclaimer { background-color: #fff3cd; color: #856404; padding: 12px 15px; border-left: 5px solid #ffeeba; border-radius: 6px; margin-bottom: 20px; font-size: 14px; text-align: left; }
  .search-box { padding: 12px; width: 100%; max-width: 350px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; outline: none; box-sizing: border-box; }
  .nav-tools { margin-bottom: 20px; display: none; justify-content: center; gap: 10px; flex-wrap: wrap; }
  .btn-nav { background-color: #007BFF; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; min-width: 130px; transition: 0.2s; }
  .btn-nav:hover { background-color: #0056b3; }
  .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 8px 18px; background-color: #e9ecef; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
  .tab.active { background-color: #007BFF; color: white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  table { width: 100%; }
  .student-card { display: none; flex-direction: column; background: #fafafa; padding: 20px; border-radius: 12px; border: 3px solid #343a40; margin: 15px auto; gap: 8px; max-width: 500px; }
  td { display: flex; justify-content: space-between; align-items: center; border: 1px solid #ccc; padding: 12px; border-radius: 6px; }
  td::before { content: attr(data-label); font-weight: bold; font-size: 13px; color: #444; text-align: left; flex: 1; padding-right: 10px; }
  .grade-val { font-weight: bold; font-size: 16px; text-align: right; }
  .aviso { color: #dc3545; font-size: 14px; margin-top: 15px; display: none; }
  @media (max-width: 480px) {
    .container { padding: 20px 10px; }
    .student-card { padding: 15px; max-width: 100%; box-sizing: border-box; border-width: 2px; }
    td { flex-direction: column; align-items: flex-start; gap: 8px; }
    td::before { border-bottom: 1px solid rgba(0,0,0,0.1); width: 100%; padding-bottom: 5px; margin-bottom: 2px; }
    .grade-val { align-self: flex-end; font-size: 18px; }
    .btn-nav { width: 45%; flex-grow: 1; padding: 12px 10px; }
  }
</style>
</head>
<body>
  <div class="container">
    <h2>Consulta de Notas</h2>
    <div class="disclaimer">💡 <b>Aviso:</b> Las notas del trimestre pueden tener valores distintos, ya que todas las notas no valen lo mismo (dependen de los criterios). La media se compara con el máximo de la clase, y las tareas no entregadas cuentan como 0.</div>
    
    <div class="tabs">${tabsHTML}</div>
    
    <input type="text" id="searchInput" class="search-box" placeholder="Introduce tu código..." onkeyup="filtrarNotas()">
    
    <div class="nav-tools" id="navTools">
        <button id="btnPrev" class="btn-nav" onclick="moverAlumno(-1)">⬅ Anterior</button>
        <button id="btnNext" class="btn-nav" onclick="moverAlumno(1)">Siguiente ➔</button>
    </div>

    <div id="tablesContainer">${tablesHTML}</div>
    
    <p class="aviso" id="avisoNoEncontrado">No encontrado.</p>
  </div>

  <script>
    let currentStudentIndex = -1;
    let unlocked = false;

    function cambiarPestana(index) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-btn-' + index).classList.add('active');
      document.getElementById('tab-content-' + index).classList.add('active');
      document.getElementById("searchInput").value = ""; 
      resetBusqueda();
    }

    function resetBusqueda() {
        document.querySelectorAll('.student-card').forEach(tr => tr.style.display = "none");
        currentStudentIndex = -1;
        document.getElementById('navTools').style.display = "none";
        document.getElementById('avisoNoEncontrado').style.display = "none";
    }

    function filtrarNotas() {
      const input = document.getElementById("searchInput").value.trim().toLowerCase();
      const navTools = document.getElementById('navTools');
      if (input === "") { resetBusqueda(); return; }
      let encontrado = false;
      const activeContent = document.querySelector('.tab-content.active');
      if (!activeContent) return;
      const trs = activeContent.querySelectorAll(".student-card");
      trs.forEach(tr => {
          let valorCodigo = tr.querySelector('td .grade-val').innerText.trim().toLowerCase();
          if (valorCodigo === input) {
              tr.style.display = "flex";
              encontrado = true;
              currentStudentIndex = parseInt(tr.getAttribute('data-index'));
              navTools.style.display = "flex"; 
          } else {
              tr.style.display = "none";
          }
      });
      document.getElementById('avisoNoEncontrado').style.display = encontrado ? "none" : "block";
    }

    function comprobarPassword() {
        if (!unlocked) {
            let pass = prompt("Introduce la contraseña del profesor para navegar:");
            if (pass === "1979") { unlocked = true; return true; } 
            else { alert("Contraseña incorrecta."); return false; }
        }
        return true;
    }

    function moverAlumno(direccion) {
      if (!comprobarPassword()) return;
      const activeContent = document.querySelector('.tab-content.active');
      const allCards = Array.from(activeContent.querySelectorAll('.student-card'));
      allCards.forEach(c => c.style.display = "none");
      currentStudentIndex += direccion;
      if (currentStudentIndex >= allCards.length) currentStudentIndex = 0;
      if (currentStudentIndex < 0) currentStudentIndex = allCards.length - 1;
      const nextCard = allCards[currentStudentIndex];
      nextCard.style.display = "flex";
      document.getElementById("searchInput").value = nextCard.querySelector('td .grade-val').innerText;
    }

    window.onload = function() {
       document.querySelectorAll('.student-card').forEach(tr => tr.style.display = "none");
    }
  <\/script>
</body>
</html>`;

        const blob = new Blob([finalHTML], { type: "text/html;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Notas_Alumnos.html";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body></html>
