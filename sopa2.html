<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Educativo - 4º Primaria</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        
        /* Estilos de las pestañas */
        .tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #e0e0e0;
            color: #333;
            transition: 0.3s;
        }
        .tab-btn:hover { background-color: #d5d5d5; }
        .tab-btn.active.ingles { background-color: #e74c3c; color: white; }
        .tab-btn.active.mates { background-color: #3498db; color: white; }
        .tab-btn.active.lengua { background-color: #f1c40f; color: black; }
        .tab-btn.active.ciencias { background-color: #2ecc71; color: white; }
        .tab-btn.active.tecno { background-color: #9b59b6; color: white; }
        .tab-btn.active.sudokus { background-color: #e67e22; color: white; }

        /* Contenido de las pestañas */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Tabla de botones del menú */
        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .game-btn {
            padding: 15px;
            font-size: 16px;
            background-color: #f8f9fa;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #2c3e50;
        }
        .game-btn:hover { background-color: #ecf0f1; border-color: #7f8c8d; }

        /* Estilos del juego en general */
        #game-view { display: none; }
        .btn-back {
            background-color: #34495e;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 16px;
        }

        /* --- ESTILOS SOPA DE LETRAS --- */
        table.sopa-table {
            margin: 0 auto 20px auto;
            border-collapse: collapse;
            background-color: #fff;
        }
        table.sopa-table td {
            width: 35px;
            height: 35px;
            border: 1px solid #bdc3c7;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }
        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: #fdfefe;
            padding: 15px;
            border: 2px dashed #bdc3c7;
            border-radius: 10px;
        }
        .word-item {
            padding: 5px 15px;
            background: #ecf0f1;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        .hard-word { color: #c0392b; }

        /* --- ESTILOS SUDOKU --- */
        table.sudoku-table {
            border: 3px solid #2c3e50;
            margin: 0 auto 20px auto;
            border-collapse: collapse;
            background-color: #fff;
        }
        table.sudoku-table td {
            width: 45px;
            height: 45px;
            border: 1px solid #bdc3c7;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
        }
        table.sudoku-table td.thick-right { border-right: 3px solid #2c3e50; }
        table.sudoku-table td.thick-bottom { border-bottom: 3px solid #2c3e50; }
        
        .sudoku-input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #d35400; 
            background-color: #fcfcfc;
            outline: none;
            box-sizing: border-box;
            cursor: pointer;
        }
        .sudoku-input:focus { background-color: #e8f6f3; }

    </style>
</head>
<body>

<div class="container">
    <div id="menu-view">
        <h1>📚 Portal Educativo: 4º Primaria</h1>
        <p style="text-align: center; color: #666;">Selecciona una asignatura o pasatiempo y elige el nivel.</p>
        
        <div class="tabs">
            <button class="tab-btn active ingles" onclick="openTab('ingles')">🇬🇧 Inglés</button>
            <button class="tab-btn mates" onclick="openTab('mates')">📐 Matemáticas</button>
            <button class="tab-btn lengua" onclick="openTab('lengua')">📖 Lengua</button>
            <button class="tab-btn ciencias" onclick="openTab('ciencias')">🔬 Ciencias</button>
            <button class="tab-btn tecno" onclick="openTab('tecno')">💻 Tecnología</button>
            <button class="tab-btn sudokus" onclick="openTab('sudokus')">🧩 Sudokus</button>
        </div>

        <div id="tab-ingles" class="tab-content active"></div>
        <div id="tab-mates" class="tab-content"></div>
        <div id="tab-lengua" class="tab-content"></div>
        <div id="tab-ciencias" class="tab-content"></div>
        <div id="tab-tecno" class="tab-content"></div>
        <div id="tab-sudokus" class="tab-content"></div>
    </div>

    <div id="game-view">
        <button class="btn-back" onclick="goBack()">⬅ Volver al Menú</button>

        <p id="game-instructions" style="text-align: center;">Instrucciones aquí.</p>
        <div id="grid-container"></div>
        
        <h3 id="words-title" style="text-align: center;">Palabras a buscar:</h3>
        <div id="word-list-container" class="word-list"></div>
    </div>
</div>

    window.openTab = function(tabName) {
        const contents = document.querySelectorAll('.tab-content');
        contents.forEach(tab => tab.style.display = 'none');
        
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => btn.classList.remove('active'));
        
        document.getElementById('tab-' + tabName).style.display = 'block';
        
        const activeBtn = document.querySelector('.tab-btn.' + tabName);
        if(activeBtn) activeBtn.classList.add('active');
    };

    document.addEventListener("DOMContentLoaded", function() {
        const asignaturas = ['ingles', 'mates', 'lengua', 'ciencias', 'tecno', 'sudokus'];
        
        asignaturas.forEach(asig => {
            const container = document.getElementById('tab-' + asig);
            if (!container) return; 
            
            let html = '<div class="grid-buttons">';
            for(let i = 0; i < 10; i++) {
                const isSudoku = asig === 'sudokus';
                const label = isSudoku ? 'Sudoku ' : 'Sopa ';
                html += '<button class="game-btn" onclick="playGame(\'' + asig + '\', ' + i + ')">' + label + (i+1) + '</button>';
            }
            html += '</div>';
            container.innerHTML = html;
        });

        openTab('ingles');
    });

    window.playGame = function(asig, index) {
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        
        const nombres = { 
            ingles: "Inglés", mates: "Matemáticas", lengua: "Lengua", 
            ciencias: "Ciencias", tecno: "Tecnología", sudokus: "Lógica" 
        };
        
        const isSudoku = (asig === 'sudokus');
        const titleText = isSudoku ? '🧩 Sudoku - ' : 'Sopa de Letras - ';
        document.getElementById('game-title').innerText = titleText + nombres[asig] + ' (Nivel ' + (index+1) + ')';
        
        if (isSudoku) {
            document.getElementById('game-instructions').innerText = "Rellena los huecos vacíos con números del 1 al 9 sin repetir en ninguna fila, columna o cuadrado pequeño.";
            document.getElementById('words-title').style.display = 'none';
            document.getElementById('word-list-container').style.display = 'none';
            generateSudoku(database.sudokus[index]);
        } else {
            document.getElementById('game-instructions').innerText = "¡Busca las 15 palabras! Las rojas son nivel difícil (escritas de derecha a izquierda o de abajo a arriba).";
            document.getElementById('words-title').style.display = 'block';
            document.getElementById('word-list-container').style.display = 'flex';
            generateWordSearch(database[asig][index]);
        }
    };

    window.goBack = function() {
        document.getElementById('menu-view').style.display = 'block';
        document.getElementById('game-view').style.display = 'none';
    };

    function generateSudoku(sudokuString) {
        let tableHtml = '<table class="sudoku-table">';
        let charIndex = 0;
        
        for (let r = 0; r < 9; r++) {
            tableHtml += "<tr>";
            for (let c = 0; c < 9; c++) {
                let val = sudokuString[charIndex];
                let tdClass = "";
                
                if (c === 2 || c === 5) tdClass += " thick-right";
                if (r === 2 || r === 5) tdClass += " thick-bottom";
                
                tableHtml += `<td class="${tdClass.trim()}">`;
                
                if (val !== '0') {
                    tableHtml += val;
                } else {
                    tableHtml += `<input class="sudoku-input" type="text" maxlength="1" oninput="this.value=this.value.replace(/[^1-9]/g,'');">`;
                }
                
                tableHtml += `</td>`;
                charIndex++;
            }
            tableHtml += "</tr>";
        }
        tableHtml += "</table>";
        document.getElementById('grid-container').innerHTML = tableHtml;
    }

    function generateWordSearch(wordsObj) {
        const size = 15;
        let grid = Array.from({ length: size }, () => Array(size).fill(''));
        
        const normalDirs = [ [1,0], [0,1], [1,1] ]; 
        const reverseDirs = [ [-1,0], [0,-1], [-1,-1] ]; 
        
        let wordsList = wordsObj.map((w, index) => ({
            word: w.toUpperCase(),
            isHard: index >= 10 
        }));

        wordsList.sort((a, b) => b.word.length - a.word.length);

        wordsList.forEach(item => {
            let placed = false;
            let attempts = 0;
            const dirs = item.isHard ? reverseDirs : normalDirs;

            while (!placed && attempts < 200) {
                let dir = dirs[Math.floor(Math.random() * dirs.length)];
                let dx = dir[0], dy = dir[1];
                
                let startX = Math.floor(Math.random() * size);
                let startY = Math.floor(Math.random() * size);
                
                let endX = startX + dx * (item.word.length - 1);
                let endY = startY + dy * (item.word.length - 1);
                
                if (endX >= 0 && endX < size && endY >= 0 && endY < size) {
                    let canPlace = true;
                    for (let i = 0; i < item.word.length; i++) {
                        let cx = startX + dx * i;
                        let cy = startY + dy * i;
                        if (grid[cy][cx] !== '' && grid[cy][cx] !== item.word[i]) {
                            canPlace = false;
                            break;
                        }
                    }
                    
                    if (canPlace) {
                        for (let i = 0; i < item.word.length; i++) {
                            grid[startY + dy * i][startX + dx * i] = item.word[i];
                        }
                        placed = true;
                    }
                }
                attempts++;
            }
        });

        const alphabet = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ";
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                if (grid[y][x] === '') {
                    grid[y][x] = alphabet[Math.floor(Math.random() * alphabet.length)];
                }
            }
        }

        let tableHtml = "<table class='sopa-table'>";
        for (let y = 0; y < size; y++) {
            tableHtml += "<tr>";
            for (let x = 0; x < size; x++) {
                tableHtml += `<td>${grid[y][x]}</td>`;
            }
            tableHtml += "</tr>";
        }
        tableHtml += "</table>";
        document.getElementById('grid-container').innerHTML = tableHtml;

        let listHtml = "";
        wordsObj.forEach((w, index) => {
            const isHard = index >= 10;
            listHtml += `<div class="word-item ${isHard ? 'hard-word' : ''}"><input type="checkbox"> ${w.toUpperCase()}</div>`;
        });
        document.getElementById('word-list-container').innerHTML = listHtml;
    }
</script>

</body>
</html>
